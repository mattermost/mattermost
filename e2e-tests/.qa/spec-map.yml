# Path prefix → Playwright spec mapping for AMQA scoped automation.
# Extend incrementally; cap 20 specs per PR in spec_mapper.py.

mappings:
  - prefix: webapp/channels/src/components/post/
    specs:
      - e2e-tests/playwright/specs/functional/channels/threads/threads_list.spec.ts
  - prefix: webapp/channels/src/components/admin_console/
