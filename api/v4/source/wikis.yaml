  /api/v4/wikis:
    post:
      tags:
        - wikis
      summary: Create wiki
      description: |
        Creates a new wiki for a team.

        __Minimum server version__: TBD

        ##### Permissions
        Must have `create_wiki` permission in the team.
      operationId: CreateWiki
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - team_id
                - title
              properties:
                team_id:
                  type: string
                  description: The ID of the team this wiki belongs to
                title:
                  type: string
                  description: The title of the wiki
                description:
                  type: string
                  description: Optional description of the wiki
                icon:
                  type: string
                  description: Optional icon emoji for the wiki
        description: Wiki object to be created
        required: true
      responses:
        "201":
          description: Wiki creation successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wiki"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v4/wikis/{wiki_id}:
    get:
      tags:
        - wikis
      summary: Get wiki
      description: |
        Get a wiki by ID.

        __Minimum server version__: TBD

        ##### Permissions
        Must have `read_channel_content` permission in the wiki's channel.
      operationId: GetWiki
      parameters:
        - name: wiki_id
          in: path
          description: Wiki GUID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wiki retrieval successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wiki"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags:
        - wikis
      summary: Update wiki
      description: |
        Partially update a wiki by providing only the fields you want to
        update. Omitted fields will not be updated. The fields that can be
        updated are defined in the request body, all other provided fields
        will be ignored.

        __Minimum server version__: TBD

        ##### Permissions
        Must have `manage_wiki` permission in the wiki.
      operationId: UpdateWiki
      parameters:
        - name: wiki_id
          in: path
          description: Wiki GUID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: The title of the wiki
                description:
                  type: string
                  description: The description of the wiki
                icon:
                  type: string
                  description: The icon emoji for the wiki
        description: Wiki object to be updated
        required: true
      responses:
        "200":
          description: Wiki update successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wiki"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - wikis
      summary: Delete wiki
      description: |
        Soft deletes a wiki. This will set the `delete_at` to the current
        timestamp in the database and also detach all pages from the wiki.

        __Minimum server version__: TBD

        ##### Permissions
        Must have `delete_wiki` permission for the wiki.
      operationId: DeleteWiki
      parameters:
        - name: wiki_id
          in: path
          description: Wiki GUID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wiki deletion successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

