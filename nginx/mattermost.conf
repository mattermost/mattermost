# Mattermost reverse proxy config
# Upload vào: /home/techzen/docker/nginx/ (tên file: mattermost.conf)
# Sau đó reload: docker exec common-nginx nginx -s reload

upstream mattermost_backend {
    server mattermost-app:8065;
    keepalive 32;
}

server {
    listen 80;
    server_name tc.techzen.vn;

    client_max_body_size 50M;

    access_log /var/log/nginx/mattermost.access.log;
    error_log  /var/log/nginx/mattermost.error.log;

    # WebSocket (Mattermost realtime)
    location ~ /api/v[0-9]+/(users/)?websocket$ {
        proxy_pass http://mattermost_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://mattermost_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }
}
