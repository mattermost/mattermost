services:
  postgres:
    restart: 'no'
    container_name: mattermost-postgres
    profiles: [postgres]
    ports:
      - "5432:5432"
    volumes:
     - "postgres-14-data:/var/lib/postgresql/data"
    extends:
        file: build/docker-compose.common.yml
        service: postgres
  minio:
    restart: 'no'
    container_name: mattermost-minio
    profiles: [minio]
    ports:
      - "9000:9000"
      - "9002:9002"
    extends:
        file: build/docker-compose.common.yml
        service: minio
  inbucket:
    restart: 'no'
    container_name: mattermost-inbucket
    profiles: [inbucket]
    ports:
      - "9001:9001"
      - "10025:10025"
      - "10110:10110"
    extends:
        file: build/docker-compose.common.yml
        service: inbucket
  openldap:
    restart: 'no'
    container_name: mattermost-openldap
    profiles: [openldap]
    ports:
      - "389:389"
      - "636:636"
    extends:
        file: build/docker-compose.common.yml
        service: openldap
  elasticsearch:
    restart: 'no'
    container_name: mattermost-elasticsearch
    profiles: [elasticsearch]
    ports:
      - "9200:9200"
      - "9300:9300"
    extends:
        file: build/docker-compose.common.yml
        service: elasticsearch
  opensearch:
    container_name: mattermost-opensearch
    profiles: [opensearch]
    ports:
      - "9201:9201"
    extends:
        file: build/docker-compose.common.yml
        service: opensearch
  redis:
    container_name: mattermost-redis
    profiles: [redis]
    ports:
      - "6379:6379"
    extends:
        file: build/docker-compose.common.yml
        service: redis
  dejavu:
    restart: 'no'
    container_name: mattermost-dejavu
    profiles: [dejavu]
    ports:
      - "1358:1358"
    extends:
        file: build/docker-compose.common.yml
        service: dejavu
  keycloak:
    restart: 'no'
    container_name: mattermost-saml
    profiles: [keycloak]
    ports:
      - "8484:8080"
    extends:
        file: build/docker-compose.common.yml
        service: keycloak
  prometheus:
    restart: 'no'
    container_name: mattermost-prometheus
    profiles: [prometheus]
    ports:
      - "9090:9090"
    extends:
        file: build/docker-compose.common.yml
        service: prometheus
  grafana:
    restart: 'no'
    container_name: mattermost-grafana
    profiles: [grafana]
    ports:
      - "3000:3000"
    extends:
        file: build/docker-compose.common.yml
        service: grafana
  loki:
    container_name: mattermost-loki
    profiles: [loki]
    ports:
      - "3100:3100"
    extends:
        file: build/docker-compose.common.yml
        service: loki
  otel-collector:
    container_name: mattermost-otel-collector
    profiles: [otel-collector]
    ports:
      - "13133:13133"
    extends:
        file: build/docker-compose.common.yml
        service: otel-collector

  start_dependencies:
    image: mattermost/mattermost-wait-for-dep:latest
    networks:
      - mm-test

networks:
  mm-test:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.254.0/24
          ip_range: 192.168.254.0/24

volumes:
  postgres-14-data:
