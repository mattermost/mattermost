x-logging: &default-logging
  driver: "json-file"
  options:
    tag: "{{.Name}}"

services:
  postgres:
    image: "postgres:14"
    container_name: mattermost-postgres
    profiles: [postgres]
    logging: *default-logging
    networks:
      - mm-test
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mostest}
      POSTGRES_DB: mattermost_test
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
    volumes:
      - "postgres-14-data:/var/lib/postgresql/data"
      - "./docker/postgres.conf:/etc/postgresql/postgresql.conf:Z"
      - "./docker/postgres_node_database.sql:/docker-entrypoint-initdb.d/postgres_node_database.sql:Z"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 3

  minio:
    image: "minio/minio:RELEASE.2024-06-22T05-26-45Z"
    container_name: mattermost-minio
    profiles: [minio]
    logging: *default-logging
    command: "server /data --console-address :9002"
    networks:
      - mm-test
    environment:
      MINIO_ROOT_USER: minioaccesskey
      MINIO_ROOT_PASSWORD: miniosecretkey
      MINIO_KMS_SECRET_KEY: my-minio-key:OSMM+vkKUTCvQs9YL/CVMIMt43HFhkUpqJxTmGl6rYw=
    ports:
      - "9000:9000"
      - "9002:9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  inbucket:
    image: "inbucket/inbucket:3.1.1"
    container_name: mattermost-inbucket
    profiles: [inbucket]
    logging: *default-logging
    environment:
      INBUCKET_WEB_ADDR: "0.0.0.0:9001"
      INBUCKET_POP3_ADDR: "0.0.0.0:10110"
      INBUCKET_SMTP_ADDR: "0.0.0.0:10025"
    networks:
      - mm-test
    ports:
      - "9001:9001"
      - "10025:10025"
      - "10110:10110"
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:9001/"]
      interval: 5s
      timeout: 5s
      retries: 5

  openldap:
    image: "osixia/openldap:1.4.0"
    container_name: mattermost-openldap
    profiles: [openldap]
    logging: *default-logging
    networks:
      - mm-test
    environment:
      LDAP_TLS_VERIFY_CLIENT: "never"
      LDAP_ORGANISATION: "Mattermost Test"
      LDAP_DOMAIN: "mm.test.com"
      LDAP_ADMIN_PASSWORD: "mostest"
    ports:
      - "389:389"
      - "636:636"
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost -b '' -s base > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 5

  elasticsearch:
    build:
      context: build
      dockerfile: Dockerfile.elasticsearch
    container_name: mattermost-elasticsearch
    profiles: [elasticsearch]
    networks:
      - mm-test
    environment:
      http.host: "0.0.0.0"
      http.port: 9200
      http.cors.enabled: "true"
      http.cors.allow-origin: "http://localhost:1358,http://127.0.0.1:1358"
      http.cors.allow-headers: "X-Requested-With,X-Auth-Token,Content-Type,Content-Length,Authorization"
      http.cors.allow-credentials: "true"
      transport.host: "127.0.0.1"
      xpack.security.enabled: "false"
      action.destructive_requires_name: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  opensearch:
    build:
      context: build
      dockerfile: Dockerfile.opensearch
    container_name: mattermost-opensearch
    profiles: [opensearch]
    networks:
      - mm-test
    environment:
      http.host: "0.0.0.0"
      http.port: 9201
      http.cors.enabled: "true"
      http.cors.allow-origin: "http://localhost:1358,http://127.0.0.1:1358"
      http.cors.allow-headers: "X-Requested-With,X-Auth-Token,Content-Type,Content-Length,Authorization"
      http.cors.allow-credentials: "true"
      transport.host: "127.0.0.1"
      discovery.type: single-node
      plugins.security.disabled: "true"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9201:9201"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9201/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: "redis:7.4.0"
    container_name: mattermost-redis
    profiles: [redis]
    logging: *default-logging
    networks:
      - mm-test
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dejavu:
    image: "appbaseio/dejavu:3.4.2"
    container_name: mattermost-dejavu
    profiles: [dejavu]
    logging: *default-logging
    networks:
      - mm-test
    ports:
      - "1358:1358"
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:1358/"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: "quay.io/keycloak/keycloak:23.0.7"
    container_name: mattermost-saml
    profiles: [keycloak]
    logging: *default-logging
    entrypoint: /opt/keycloak/bin/kc.sh start --import-realm
    networks:
      - mm-test
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HTTP_ENABLED: 'true'
    volumes:
      - "./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:Z"
    ports:
      - "8484:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  prometheus:
    image: "prom/prometheus:v2.46.0"
    container_name: mattermost-prometheus
    profiles: [prometheus]
    logging: *default-logging
    user: root
    volumes:
      - "./docker/prometheus.yml:/etc/prometheus/prometheus.yml:Z"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - mm-test
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana:
    image: "grafana/grafana:10.4.2"
    container_name: mattermost-grafana
    profiles: [grafana]
    logging: *default-logging
    volumes:
      - "./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:Z"
      - "./docker/grafana/provisioning:/etc/grafana/provisioning:Z"
      - "./docker/grafana/dashboards:/var/lib/grafana/dashboards:Z"
    networks:
      - mm-test
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  loki:
    image: "grafana/loki:3.0.0"
    container_name: mattermost-loki
    profiles: [loki]
    logging: *default-logging
    volumes:
      - "./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:Z"
    networks:
      - mm-test
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  otel-collector:
    image: "otel/opentelemetry-collector-contrib:0.145.0"
    container_name: mattermost-otel-collector
    profiles: [otel-collector]
    logging: *default-logging
    user: "0:0"
    volumes:
      - "./docker/otel-collector/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:Z"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "../logs:/logs:ro,Z"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    networks:
      - mm-test
    ports:
      - "13133:13133"
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:13133"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  mm-test:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.254.0/24
          ip_range: 192.168.254.0/24

volumes:
  postgres-14-data:
