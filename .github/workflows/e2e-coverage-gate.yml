---
name: E2E Coverage Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Job 1: decide whether to skip ──────────────────────────────────────────
  check-override:
    name: ci/e2e-coverage/check-override
    runs-on: ubuntu-24.04
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: ci/e2e-coverage/check-skip-label-or-comment
        id: check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            // 1. Label check
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.labels.some(l => l.name === 'skip-e2e-coverage-check')) {
              core.setOutput('skip', 'true');
              core.setOutput('reason', 'Label `skip-e2e-coverage-check` is set on this PR.');
              return;
            }

            // 2. Comment check — find the last /skip-e2e-check: comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const skipComment = [...comments].reverse().find(c =>
              c.body.trim().toLowerCase().startsWith('/skip-e2e-check:')
            );
            if (skipComment) {
              const reason = skipComment.body.replace(/^\/skip-e2e-check:/i, '').trim();
              core.setOutput('skip', 'true');
              core.setOutput('reason', `Skip requested: ${reason || '(no reason given)'}`);
              return;
            }

            core.setOutput('skip', 'false');
            core.setOutput('reason', '');

  # ── Job 2: analysis (runs when not skipped) ─────────────────────────────────
  coverage-check:
    name: ci/e2e-coverage/analyze
    runs-on: ubuntu-24.04
    needs: check-override
    if: needs.check-override.outputs.skip == 'false'
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: ci/setup-node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: e2e-tests/playwright/package-lock.json

      - name: ci/e2e-coverage/install-deps
        working-directory: e2e-tests/playwright
        run: npm ci --ignore-scripts

      - name: ci/e2e-coverage/plan-enforcement
        id: plan
        working-directory: e2e-tests/playwright
        # V2: Deterministic graph-based analysis — no AI API calls needed.
        # ANTHROPIC_API_KEY is no longer required for the default path.
        # continue-on-error so we can post the PR comment before failing
        continue-on-error: true
        run: |
          npx e2e-ai-agents plan \
            --config ./e2e-ai-agents.config.json \
            --since origin/${{ github.base_ref }} \
            --fail-on-must-add-tests \
            --github-output "$GITHUB_OUTPUT"

      - name: ci/e2e-coverage/post-pr-comment
        if: always() && needs.check-override.outputs.skip == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const planPath = 'e2e-tests/playwright/.e2e-ai-agents/plan.json';
            const marker = '<!-- e2e-coverage-gate -->';

            let body;
            if ('${{ steps.plan.outcome }}' === 'failure' && !fs.existsSync(planPath)) {
              body = '> ⚠️ **E2E Coverage Gate — analysis error**\n> The plan analysis step failed. Check the [workflow logs](' + context.payload.pull_request.html_url + '/checks) for details.';
            } else if (fs.existsSync(planPath)) {
              const plan = JSON.parse(fs.readFileSync(planPath, 'utf8'));
              const {action, title, summary} = plan.decision;
              const {changedFiles, impactedFlows, p0Flows, p1Flows, uncoveredP0P1Flows} = plan.metrics;
              const emoji = action === 'must-add-tests' ? '🔴' : action === 'safe-to-merge' ? '🟢' : '🟡';
              const lines = [
                `## ${emoji} E2E Coverage: ${title}`,
                '',
                summary,
                '',
                ...(changedFiles > 0 ? [`**${changedFiles}** file(s) changed → **${impactedFlows}** flow(s) impacted` +
                  (p0Flows > 0 || p1Flows > 0 ? ` (P0: ${p0Flows}, P1: ${p1Flows})` : '')] : []),
              ];

              if (action === 'must-add-tests' && (plan.gapDetails || plan.requiredNewTests || []).length > 0) {
                lines.push('', `### ⚠️ Missing coverage for ${uncoveredP0P1Flows} P0/P1 flow(s)`, '');
                const gaps = plan.gapDetails && plan.gapDetails.length > 0 ? plan.gapDetails : null;
                if (gaps) {
                  for (const gap of gaps) {
                    lines.push(`<details>`);
                    lines.push(`<summary><b>${gap.name}</b> <code>${gap.id}</code> · ${gap.priority}</summary>`);
                    lines.push('');
                    if (gap.reasons && gap.reasons.length > 0) {
                      lines.push('**Why impacted:**');
                      lines.push('');
                      for (const r of gap.reasons) lines.push(`- ${r}`);
                      lines.push('');
                    }
                    if (gap.existingTests && gap.existingTests.length > 0) {
                      lines.push('**Existing tests (add scenarios here):**');
                      lines.push('');
                      for (const t of gap.existingTests) lines.push(`- \`${t.replace(/^specs\//, '')}\``);
                      lines.push('');
                    }
                    if (gap.missingScenarios && gap.missingScenarios.length > 0) {
                      lines.push('<details>');
                      lines.push(`<summary>Suggested test scenarios (${gap.missingScenarios.length})</summary>`);
                      lines.push('');
                      for (const s of gap.missingScenarios) lines.push(`- ${s}`);
                      lines.push('');
                      lines.push('</details>');
                      lines.push('');
                    }
                    lines.push('</details>');
                    lines.push('');
                  }
                } else {
                  for (const gap of plan.requiredNewTests) lines.push(`- ${gap}`);
                }
              }

              if (action !== 'must-add-tests' && plan.coveredFlows && plan.coveredFlows.length > 0) {
                lines.push('');
                lines.push('<details>');
                lines.push(`<summary>Covered flows (${plan.coveredFlows.length})</summary>`);
                lines.push('');
                for (const cf of plan.coveredFlows) {
                  const tests = cf.coveredBy.map(t => `\`${t.replace(/^specs\//, '')}\``).join(', ');
                  lines.push(`- **${cf.name}** (${cf.priority})${tests ? ' — ' + tests : ''}`);
                }
                lines.push('');
                lines.push('</details>');
              }

              body = lines.join('\n');
              if (action !== 'safe-to-merge') {
                body += '\n\n---\n_To skip: add the `skip-e2e-coverage-check` label **or** comment `/skip-e2e-check: <reason>`._';
              }
            } else {
              body = '_E2E coverage analysis ran but produced no summary._';
            }

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: fullBody,
              });
            }

      - name: ci/e2e-coverage/fail-if-gaps
        if: always() && steps.plan.outcome == 'failure'
        run: |
          echo "::error::E2E coverage check failed — E2E tests are required for flows impacted by this PR."
          echo "See the PR comment for the list of affected flows and suggested tests to add."
          echo "To bypass: add the 'skip-e2e-coverage-check' label or comment '/skip-e2e-check: <reason>'."
          exit 2

  # ── Job 3: skip-notice (runs when skipped) ──────────────────────────────────
  skip-notice:
    name: ci/e2e-coverage/skipped
    runs-on: ubuntu-24.04
    needs: check-override
    if: needs.check-override.outputs.skip == 'true'
    steps:
      - name: ci/e2e-coverage/post-skip-comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          SKIP_REASON: ${{ needs.check-override.outputs.reason }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const reason = process.env.SKIP_REASON || '';
            const marker = '<!-- e2e-coverage-gate -->';
            const body = `${marker}\n> **E2E Coverage Gate — skipped**\n> ${reason}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
