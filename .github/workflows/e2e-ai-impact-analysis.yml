name: E2E-Agents Impact Analysis

on:
  pull_request:
    paths:
      - 'webapp/**'
      - 'e2e-tests/playwright/**'
      - '.github/workflows/e2e-ai-impact-analysis.yml'
    branches:
      - 'master'
      - 'main'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  impact-analysis:
    name: Impact Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BASE_REF: ${{ github.base_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup E2E AI Agents environment
        uses: ./.github/actions/setup-e2e-ai-agents
        with:
          skip-build: 'true'
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run impact analysis
        working-directory: e2e-tests/playwright
        run: |
          # Determine comparison ref: use BASE_REF for PR events, fallback to master for manual dispatch
          SINCE_REF="${BASE_REF:-master}"
          if [ -z "$BASE_REF" ]; then
            SINCE_REF="origin/master"
          else
            SINCE_REF="origin/$BASE_REF"
          fi

          node ./node_modules/@yasserkhanorg/e2e-agents/dist/cli.js impact \
            --path ../../webapp \
            --tests-root . \
            --config ./e2e-ai-agents.config.json \
            --since "$SINCE_REF" \
            --allow-fallback

      - name: Extract impact summary
        working-directory: e2e-tests/playwright
        id: impact_summary
        run: |
          PLAN_FILE=".e2e-ai-agents/reports/impact-plan.md"
          if [ -f "$PLAN_FILE" ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment with impact analysis
        if: github.event_name == 'pull_request' && steps.impact_summary.outputs.report_exists == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'e2e-tests/playwright/.e2e-ai-agents/reports/impact-plan.md';

            if (!fs.existsSync(reportPath)) {
              console.log('Impact report not found, skipping comment');
              return;
            }

            const fullReport = fs.readFileSync(reportPath, 'utf8');
            let comment = '';
            comment += '## 📈 E2E Test Impact Analysis\n\n';

            comment += 'This PR affects the following test coverage:\n\n';

            const affectedSection = fullReport.substring(
              fullReport.indexOf('Impacted Flows:'),
              fullReport.indexOf('Changed Files:')
            );

            if (affectedSection && affectedSection.length > 20) {
              const flows = affectedSection.split('\n').filter(l => l.includes('[P0]') || l.includes('[P1]'));
              if (flows.length > 0) {
                comment += '**Affected Flows:**\n';
                flows.slice(0, 10).forEach(flow => {
                  comment += `- ${flow}\n`;
                });
                comment += '\n';
              } else {
                comment += '✅ No critical test flows affected\n\n';
              }
            }

            const decisionMatch = fullReport.match(/Decision: (.*)\n/);
            if (decisionMatch) {
              const decision = decisionMatch[1];
              if (decision.includes('must-add-tests')) {
                comment += '⚠️ **Recommendation**: Tests should be added for affected flows\n\n';
              } else if (decision.includes('should-add-tests')) {
                comment += '📋 **Recommendation**: Consider adding tests for affected flows\n\n';
              } else {
                comment += '✅ **Recommendation**: Current test coverage is sufficient\n\n';
              }
            }

            comment += '**How to Generate Tests:**\n';
            comment += '```bash\n';
            comment += 'npm run test:ai:generate --scenarios 3\n';
            comment += 'npm run test -- ai-assisted\n';
            comment += 'npm run test:ai:finalize --create-pr\n';
            comment += '```\n\n';

            comment += '📖 [View full impact report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
            comment += '📚 [E2E Testing Guide](./e2e-tests/playwright/AI_TESTING_GUIDE.md)\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload impact report as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: impact-analysis-report
          path: e2e-tests/playwright/.e2e-ai-agents/reports/impact-plan.md
          retention-days: 30
