name: Migration Review & Release Notes
 
# Fires whenever a new .up.sql file lands on master.
# Runs the review-migration and migration-release-notes skills via Claude,
# commits the output to a short-lived branch, opens a PR assigned to the
# release manager, and posts a link on the original migration PR.
#
# Required secrets:  ANTHROPIC_API_KEY (already in this repo)
# Required variables: MIGRATION_REVIEW_ASSIGNEE (GitHub username to assign)
#
# No other secrets or external services needed.
 
on:
  push:
    branches: [master]
    paths:
      - 'server/channels/db/migrations/postgres/**.up.sql'
 
permissions:
  contents: write       # to create the review branch and commit the file
  pull-requests: write  # to open the review PR and comment on the migration PR
 
jobs:
  generate:
    name: Generate migration review & release notes
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # fetch-depth: 0 fetches the full history so that multi-commit pushes
          # are handled correctly — diff covers all commits in the push, not
          # just the latest one.
          fetch-depth: 0
          persist-credentials: false
 
      - name: Set up Python
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'
 
      - name: Install dependencies
        run: pip install anthropic
 
      - name: Detect and process new migrations
        # All secrets/variables are injected as environment variables by
        # GitHub Actions — they are never interpolated into shell commands.
        # The file list from `git diff` goes directly into a bash array via
        # process substitution (mapfile + <(...)); it never passes through
        # GITHUB_OUTPUT or any ${{ }} expression, eliminating the
        # heredoc-delimiter injection vector entirely.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MIGRATION_REVIEW_ASSIGNEE: ${{ vars.MIGRATION_REVIEW_ASSIGNEE }}
          # Full push range (previous HEAD → new HEAD).
          # Env var keeps this out of ${{ }} shell expansion.
          PUSH_BASE_SHA: ${{ github.event.before }}
        run: |
          # Collect newly-added .up.sql paths across ALL commits in this push.
          # $PUSH_BASE_SHA..$GITHUB_SHA covers every commit, not just the
          # latest — handles multi-commit pushes correctly.
          # Process substitution puts each path in its own array element;
          # no value is ever shell-interpolated.
          mapfile -t files < <(
            git diff --name-only --diff-filter=A \
              "$PUSH_BASE_SHA" "$GITHUB_SHA" \
              -- 'server/channels/db/migrations/postgres/*.up.sql'
          )
 
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No new .up.sql files — skipping."
            exit 0
          fi
 
          echo "Found ${#files[@]} new migration(s):"
          printf '  %s\n' "${files[@]}"
 
          # Each element of ${files[@]} is a separate, quoted argument.
          python .github/scripts/migration_automation.py "${files[@]}"
