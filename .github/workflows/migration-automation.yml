name: Migration Review & Release Notes
 
# Fires whenever a new .up.sql file lands on master.
# Runs the review-migration and migration-release-notes skills via Claude,
# commits the output to a short-lived branch, opens a PR assigned to the
# release manager, and posts a link on the original migration PR.
#
# Required secrets:  ANTHROPIC_API_KEY (already in this repo)
# Required variables: MIGRATION_REVIEW_ASSIGNEE (GitHub username to assign)
#
# No other secrets or external services needed.
 
on:
  push:
    branches: [master]
    paths:
      - 'server/channels/db/migrations/postgres/**.up.sql'
 
permissions:
  contents: write       # to create the review branch and commit the file
  pull-requests: write  # to open the review PR and comment on the migration PR
 
jobs:
  generate:
    name: Generate migration review & release notes
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 2            # need HEAD~1 to detect added files
          persist-credentials: false
 
      - name: Detect newly added migration files
        id: detect
        run: |
          # Collect newly added .up.sql files (one per line, no trailing spaces)
          NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- \
            'server/channels/db/migrations/postgres/*.up.sql')
          if [ -n "$NEW" ]; then
            echo "New migrations found:"
            echo "$NEW"
            # Use heredoc delimiter to safely pass newline-delimited paths
            {
              printf 'files<<__MM_EOF__\n'
              printf '%s\n' "$NEW"
              printf '__MM_EOF__\n'
            } >> "$GITHUB_OUTPUT"
          else
            echo "No new .up.sql files — skipping."
          fi
 
      - name: Set up Python
        if: steps.detect.outputs.files != ''
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'
 
      - name: Install dependencies
        if: steps.detect.outputs.files != ''
        run: pip install anthropic
 
      - name: Run migration automation
        if: steps.detect.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MIGRATION_REVIEW_ASSIGNEE: ${{ vars.MIGRATION_REVIEW_ASSIGNEE }}
          # Newline-delimited file list from the detect step
          MIGRATION_FILES: ${{ steps.detect.outputs.files }}
        run: |
          # Build a bash array from the newline-delimited list; each element is
          # passed as a separate, properly-quoted argument — no shell injection.
          mapfile -t files <<< "$MIGRATION_FILES"
          python .github/scripts/migration_automation.py "${files[@]}"
