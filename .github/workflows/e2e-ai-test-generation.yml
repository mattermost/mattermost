---
name: E2E AI Test Generation

# Triggers for automated test generation
on:
  workflow_dispatch:
    inputs:
      flow_name:
        type: string
        description: 'Optional: Specific flow to generate tests for (e.g., messaging.send)'
        required: false
      scenario_count:
        type: choice
        description: 'Number of scenarios per flow'
        default: '3'
        options:
          - '1'
          - '2'
          - '3'
          - '5'
      auto_commit:
        type: boolean
        description: 'Auto-commit tests to new branch'
        default: true
  schedule:
    # Run weekly on Sunday to catch accumulated gaps
    - cron: '0 3 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-gaps:
    runs-on: ubuntu-24.04
    outputs:
      gaps-detected: ${{ steps.gap-analysis.outputs.gaps-detected }}
      gap-count: ${{ steps.gap-analysis.outputs.gap-count }}
      priority-flows: ${{ steps.gap-analysis.outputs.priority-flows }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup E2E AI Agents environment
        uses: ./.github/actions/setup-e2e-ai-agents
        with:
          skip-build: 'true'
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Analyze test gaps
        id: gap-analysis
        working-directory: e2e-tests/playwright
        run: |
          npx @yasserkhanorg/e2e-agents gap \
            --path ../../webapp \
            --tests-root . \
            --config ./e2e-ai-agents.config.json \
            --allow-fallback || echo "Gap analysis not available in this version"

          # Check if gap report exists
          if [ -f .e2e-ai-agents/gap.json ]; then
            GAPS=$(jq '.flows | length' .e2e-ai-agents/gap.json || echo 0)
            if [ "$GAPS" -gt 0 ]; then
              echo "gaps-detected=true" >> "$GITHUB_OUTPUT"
              echo "gap-count=$GAPS" >> "$GITHUB_OUTPUT"
              # Extract P0/P1 flows
              PRIORITY=$(jq -r '.flows[] | select(.priority == "P0" or .priority == "P1") | .name' .e2e-ai-agents/gap.json | tr '\n' ',' | sed 's/,$//')
              echo "priority-flows=$PRIORITY" >> "$GITHUB_OUTPUT"
            else
              echo "gaps-detected=false" >> "$GITHUB_OUTPUT"
              echo "gap-count=0" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "gaps-detected=false" >> "$GITHUB_OUTPUT"
            echo "gap-count=0" >> "$GITHUB_OUTPUT"
          fi

  generate-tests:
    needs: check-gaps
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule' && needs.check-gaps.outputs.gaps-detected == 'true')
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup E2E AI Agents environment
        uses: ./.github/actions/setup-e2e-ai-agents
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate tests for gaps
        id: generate
        working-directory: e2e-tests/playwright
        continue-on-error: true
        env:
          SCENARIO_COUNT: ${{ github.event.inputs.scenario_count || '3' }}
          FLOW_NAME: ${{ github.event.inputs.flow_name || '' }}
        run: |
          # Build base command
          CMD="npx @yasserkhanorg/e2e-agents approve-and-generate"
          CMD="$CMD --path ../../webapp"
          CMD="$CMD --tests-root ."
          CMD="$CMD --config ./e2e-ai-agents.config.json"
          CMD="$CMD --pipeline"
          CMD="$CMD --pipeline-scenarios $SCENARIO_COUNT"
          CMD="$CMD --pipeline-output ./specs/functional/ai-assisted"
          CMD="$CMD --pipeline-headless"
          CMD="$CMD --pipeline-mcp"
          CMD="$CMD --pipeline-mcp-allow-fallback"

          # Add specific flow if provided
          if [ -n "$FLOW_NAME" ]; then
            CMD="$CMD --flow-patterns '*/$FLOW_NAME/*'"
          fi

          echo "Running: $CMD"
          eval "$CMD" || {
            echo "Test generation encountered issues (may be expected)"
            echo "generation-result=partial" >> "$GITHUB_OUTPUT"
            exit 0
          }

          echo "generation-result=success" >> "$GITHUB_OUTPUT"

      - name: Verify generated tests
        id: verify
        working-directory: e2e-tests/playwright
        run: |
          if [ ! -d specs/functional/ai-assisted ]; then
            echo "No tests generated"
            echo "test-count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TEST_COUNT=$(find specs/functional/ai-assisted -name "*.spec.ts" | wc -l)
          echo "test-count=$TEST_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$TEST_COUNT" -gt 0 ]; then
            echo "Generated $TEST_COUNT test files"
            find specs/functional/ai-assisted -name "*.spec.ts" | head -10
          fi

      - name: Run generated tests (dry-run)
        if: steps.verify.outputs.test-count > 0
        working-directory: e2e-tests/playwright
        continue-on-error: true
        run: |
          echo "Validating generated test syntax..."
          npm run build
          npx playwright test --list --grep "ai-assisted" || echo "Some tests may have issues"

      - name: Create generation summary
        if: always()
        working-directory: e2e-tests/playwright
        run: |
          mkdir -p .e2e-ai-agents

          node -e "
            const fs = require('fs');
            const path = require('path');

            const summary = {
              timestamp: new Date().toISOString(),
              generationMethod: 'e2e-ai-agents approve-and-generate',
              scenario_count: process.env.SCENARIO_COUNT || '3',
              use_mcp: true,
              flow_filter: process.env.FLOW_NAME || 'all',
              test_count: 0,
              generated_specs: []
            };

            // Count generated tests
            if (fs.existsSync('specs/functional/ai-assisted')) {
              const specs = [];
              const walkDir = (dir) => {
                const files = fs.readdirSync(dir);
                files.forEach(file => {
                  const filePath = path.join(dir, file);
                  const stat = fs.statSync(filePath);
                  if (stat.isDirectory()) {
                    walkDir(filePath);
                  } else if (file.endsWith('.spec.ts')) {
                    specs.push(filePath.replace(/^.*specs\//, 'specs/'));
                  }
                });
              };
              walkDir('specs/functional/ai-assisted');
              summary.test_count = specs.length;
              summary.generated_specs = specs;
            }

            fs.writeFileSync(
              '.e2e-ai-agents/generation-summary.json',
              JSON.stringify(summary, null, 2)
            );

            console.log('Generated test summary:');
            console.log('- Tests generated:', summary.test_count);
            console.log('- Scenario count:', summary.scenario_count);
            console.log('- MCP enabled:', summary.use_mcp);
          "

      - name: Commit generated tests
        if: |
          github.event.inputs.auto_commit == 'true' &&
          steps.verify.outputs.test-count > 0
        working-directory: .
        env:
          TEST_COUNT: ${{ steps.verify.outputs.test-count }}
          SCENARIO_COUNT: ${{ github.event.inputs.scenario_count || '3' }}
          FLOW_FILTER: ${{ github.event.inputs.flow_name || 'all P0/P1 gaps' }}
        run: |
          git config user.name "E2E AI Bot"
          git config user.email "e2e-bot@mattermost.com"

          # Create feature branch
          BRANCH_NAME="e2e-agents/generated-tests-$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"

          # Stage generated tests
          git add e2e-tests/playwright/specs/functional/ai-assisted/
          git add e2e-tests/playwright/.e2e-ai-agents/generation-summary.json

          # Commit with details
          git commit -m "feat(e2e): Auto-generated AI tests for $TEST_COUNT scenarios

            Generated using @yasserkhanorg/e2e-agents approve-and-generate workflow:
            - Scenario count: $SCENARIO_COUNT
            - MCP enabled: true
            - Flow filter: $FLOW_FILTER
            - Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')

            Tests are ready for review and validation. Run with:
              npm test -- --grep '@ai-generated'

            See generation-summary.json for details on generated specs."

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Create pull request
        if: |
          github.event.inputs.auto_commit == 'true' &&
          steps.verify.outputs.test-count > 0
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          TEST_COUNT: ${{ steps.verify.outputs.test-count }}
          GAP_COUNT: ${{ needs.check-gaps.outputs.gap-count }}
          SCENARIO_COUNT: ${{ github.event.inputs.scenario_count || '3' }}
          PRIORITY_FLOWS: ${{ needs.check-gaps.outputs.priority-flows }}
        with:
          script: |
            const branchName = process.env.BRANCH_NAME || 'e2e-agents/generated-tests';
            const testCount = process.env.TEST_COUNT;
            const gapCount = process.env.GAP_COUNT;
            const scenarioCount = process.env.SCENARIO_COUNT;
            const priorityFlows = process.env.PRIORITY_FLOWS;

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `E2E: Auto-generated tests for ${testCount} scenarios`,
              head: branchName,
              base: context.ref,
              body: `## Auto-Generated E2E Tests

                Generated ${testCount} test scenarios using e2e-ai-agents:
                - **Scenario count**: ${scenarioCount}
                - **MCP enabled**: true
                - **Test count**: ${testCount}

                ### Generated Files
                See \`e2e-tests/playwright/specs/functional/ai-assisted/\` for new test files.

                ### Next Steps
                1. Review generated tests for correctness
                2. Run tests locally: \`npm test -- --grep '@ai-generated'\`
                3. Address any failures with feedback loop
                4. Merge when ready

                ### Gap Analysis
                - Gaps detected: ${gapCount}
                - Priority flows: ${priorityFlows}`
            });

            console.log('Created PR:', pr.data.html_url);

      - name: Report generation metrics
        if: always()
        working-directory: e2e-tests/playwright
        run: |
          echo "✅ Test generation completed"
          echo "📊 Generated: ${{ steps.verify.outputs.test-count }} test files"
          echo "📋 Gap analysis: ${{ needs.check-gaps.outputs.gap-count }} gaps detected"

          if [ -f .e2e-ai-agents/generation-summary.json ]; then
            echo "📄 Summary: e2e-tests/playwright/.e2e-ai-agents/generation-summary.json"
          fi
