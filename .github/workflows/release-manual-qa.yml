---
name: Release Manual QA

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Previous release tag or branch
        required: true
        type: string
      head_sha:
        description: RC commit SHA
        required: true
        type: string
      rc_tag:
        description: RC image tag label
        required: false
        type: string
      server_image_tag:
        description: Docker image tag tested
        required: false
        type: string
  workflow_call:
    inputs:
      base_ref:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      rc_tag:
        required: false
        type: string
      server_image_tag:
        required: false
        type: string

permissions: {}

jobs:
  confidence-report:
    permissions:
      contents: read
      actions: read
      pull-requests: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Prepare artifact directory
        run: mkdir -p /tmp/amqa/release-artifacts

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Generate Release Confidence Report
        working-directory: .github/scripts/amqa
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ inputs.base_ref }}
          HEAD_SHA: ${{ inputs.head_sha }}
          RC_TAG: ${{ inputs.rc_tag || inputs.server_image_tag || inputs.head_sha }}
          SERVER_IMAGE_TAG: ${{ inputs.server_image_tag || '' }}
          AMQA_ARTIFACT_DIR: /tmp/amqa/release-artifacts
          AMQA_OUTPUT_DIR: /tmp/amqa
          E2E_STATUS: parallel — see e2e-tests-on-release.yml
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL_TEST_PR_ANALYSIS_HUB }}
        run: python3 amqa_release.py

      - name: Publish job summary
        run: cat /tmp/amqa/release-confidence-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release confidence report
        uses: actions/upload-artifact@6f51ac45b3396a0f6a4a2a1863cafe909e1483c6 # v4.5.0
        with:
          name: release-confidence-${{ inputs.rc_tag || inputs.head_sha }}
          path: |
            /tmp/amqa/release-confidence-report.json
            /tmp/amqa/release-confidence-summary.md
          retention-days: 400
