---
name: E2E Test Execution with Traceability

# Triggers on push to master and nightly schedule, or manual dispatch
on:
  push:
    branches:
      - master
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      runner_pool:
        type: choice
        description: 'Runner pool'
        default: ubuntu-24.04
        options:
          - ubuntu-24.04
          - ubuntu-latest

permissions:
  contents: write
  pull-requests: write

jobs:
  e2e-test-execution:
    runs-on: ${{ github.event.inputs.runner_pool || 'ubuntu-24.04' }}
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: e2e-tests/playwright
        run: npm ci --legacy-peer-deps || npm install

      - name: Build project
        working-directory: e2e-tests/playwright
        run: npm run build

      - name: Start Mattermost server
        run: |
          docker compose -f docker-compose.yml up -d
          # Wait for server to be ready
          timeout 300 bash -c 'until curl -s http://localhost:8065/api/v4/system/ping | grep -q ok; do sleep 2; done' || exit 1

      - name: Run Playwright tests with JSON reporter
        working-directory: e2e-tests/playwright
        continue-on-error: true
        run: |
          npm test -- \
            --reporter=json \
            --output-file=playwright-report.json

      - name: Capture traceability data
        working-directory: e2e-tests/playwright
        if: always()
        run: |
          # Create traceability input from Playwright JSON report
          node -e "
            const fs = require('fs');
            const path = require('path');

            // Ensure directory exists
            const dir = './.e2e-ai-agents';
            if (!fs.existsSync(dir)) {
              fs.mkdirSync(dir, { recursive: true });
            }

            // Read Playwright report if it exists
            let tests = [];
            const reportFile = 'playwright-report.json';

            if (fs.existsSync(reportFile)) {
              try {
                const report = JSON.parse(fs.readFileSync(reportFile, 'utf8'));
                const suites = report.suites || [];

                function extractTests(suite, file = '') {
                  const currentFile = suite.file || file;
                  if (suite.tests) {
                    suite.tests.forEach(test => {
                      tests.push({
                        file: currentFile,
                        name: test.title,
                        passed: test.status === 'passed',
                        duration: test.duration || 0
                      });
                    });
                  }
                  if (suite.suites) {
                    suite.suites.forEach(s => extractTests(s, currentFile));
                  }
                }

                suites.forEach(s => extractTests(s));
              } catch (e) {
                console.warn('Could not parse playwright-report.json:', e.message);
              }
            }

            // Write traceability input
            fs.writeFileSync(
              './.e2e-ai-agents/traceability-input.json',
              JSON.stringify({ tests, timestamp: new Date().toISOString() }, null, 2)
            );

            console.log('Captured', tests.length, 'test records for traceability');
          "

      - name: Ingest traceability manifest
        working-directory: e2e-tests/playwright
        if: always()
        continue-on-error: true
        run: |
          npm run test:traceability:ingest:agents 2>/dev/null || \
          echo "Note: Traceability ingest command not available in this package version"

      - name: Generate test execution summary
        working-directory: e2e-tests/playwright
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            let summary = {
              timestamp: new Date().toISOString(),
              workflowName: 'e2e-test-execution',
              status: 'completed'
            };

            // Try to parse Playwright report
            if (fs.existsSync('playwright-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('playwright-report.json', 'utf8'));
                const stats = report.stats || {};
                summary.testStats = {
                  expected: stats.expected || 0,
                  passed: (stats.expected || 0) - (stats.unexpected || 0) - (stats.flaky || 0),
                  failed: stats.unexpected || 0,
                  flaky: stats.flaky || 0,
                  durationMs: stats.duration || 0
                };
              } catch (e) {
                console.warn('Could not parse test stats');
              }
            }

            // Create summary file for CI/CD integration
            const summaryDir = './.e2e-ai-agents';
            if (!fs.existsSync(summaryDir)) {
              fs.mkdirSync(summaryDir, { recursive: true });
            }

            fs.writeFileSync(
              path.join(summaryDir, 'ci-summary.md'),
              \`# E2E Test Execution Summary\n\n\${JSON.stringify(summary, null, 2)}\`
            );

            console.log('\\n=== Test Execution Summary ===');
            if (summary.testStats) {
              console.log('Total:', summary.testStats.expected);
              console.log('Passed:', summary.testStats.passed);
              console.log('Failed:', summary.testStats.failed);
              console.log('Flaky:', summary.testStats.flaky);
              console.log('Duration:', (summary.testStats.durationMs / 1000).toFixed(2) + 's');
            }
          "

      - name: Commit traceability manifest
        if: always() && github.ref == 'refs/heads/master'
        working-directory: .
        run: |
          git config user.name "E2E Bot"
          git config user.email "e2e-bot@mattermost.com"

          TRACEABILITY_FILE="e2e-tests/playwright/.e2e-ai-agents/traceability.json"

          if [ -f "$TRACEABILITY_FILE" ]; then
            git add "$TRACEABILITY_FILE"
            git commit -m "chore: update test traceability manifest from e2e test execution

- Captured test-to-file mappings from Playwright execution
- Used for coverage-based impact analysis in PR reviews
- Auto-generated by e2e-test-execution workflow

[skip ci]" || echo "No changes to traceability manifest"

            # Push only if we're on master and not in a PR
            if [ "master" = "master" ]; then
              git push || echo "Failed to push traceability changes"
            fi
          else
            echo "Traceability file not found, skipping commit"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: e2e-tests/playwright/playwright-report/
          retention-days: 30

      - name: Cleanup Docker
        if: always()
        run: |
          docker compose -f docker-compose.yml down || true

      - name: Report metrics
        if: always()
        working-directory: e2e-tests/playwright
        run: |
          echo "✅ E2E test execution completed"
          echo "📊 Traceability data captured to .e2e-ai-agents/"

          if [ -f ./.e2e-ai-agents/traceability-input.json ]; then
            echo "📝 Traceability input: .e2e-ai-agents/traceability-input.json"
          fi

          if [ -f ./.e2e-ai-agents/traceability.json ]; then
            echo "✨ Traceability manifest: .e2e-ai-agents/traceability.json"
          fi

          if [ -f ./.e2e-ai-agents/ci-summary.md ]; then
            echo "📄 Execution summary: .e2e-ai-agents/ci-summary.md"
          fi
