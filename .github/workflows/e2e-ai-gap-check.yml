name: E2E-Agents Gap Analysis

on:
  schedule:
    # Run gap analysis daily at 2 AM UTC (baseline report, not PR blocker)
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gap-analysis:
    name: Gap Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup E2E AI Agents environment
        uses: ./.github/actions/setup-e2e-ai-agents
        with:
          skip-build: 'true'
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Sync test mappings
        working-directory: e2e-tests/playwright
        run: npm run test:manifest:sync

      - name: Run gap analysis
        working-directory: e2e-tests/playwright
        run: |
          node ./node_modules/@yasserkhanorg/e2e-agents/dist/cli.js gap \
            --path ../../webapp \
            --tests-root . \
            --config ./e2e-ai-agents.config.json

      - name: Extract gap summary
        working-directory: e2e-tests/playwright
        id: gap_summary
        run: |
          REPORT_FILE=".e2e-ai-agents/reports/gap-report.md"
          if [ -f "$REPORT_FILE" ]; then
            P0_GAPS=$(grep -c "^\- \[P0\]" "$REPORT_FILE" || echo "0")
            P1_GAPS=$(grep -c "^\- \[P1\]" "$REPORT_FILE" || echo "0")
            echo "p0_gaps=$P0_GAPS" >> $GITHUB_OUTPUT
            echo "p1_gaps=$P1_GAPS" >> $GITHUB_OUTPUT
            echo "report_exists=true" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Report baseline gap metrics
        if: steps.gap_summary.outputs.report_exists == 'true'
        run: |
          echo "📊 Gap Analysis Report Generated"
          echo "Report location: .e2e-ai-agents/reports/gap-report.md"
          echo "This is a baseline report (not a PR blocker). Gaps should be tracked separately."

      - name: Upload gap report as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gap-analysis-report
          path: e2e-tests/playwright/.e2e-ai-agents/reports/gap-report.md
          retention-days: 30
