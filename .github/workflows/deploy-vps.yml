name: Deploy to VPS

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy'
        required: false
        default: 'false'

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/mattermost
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-webapp:
    name: Build Webapp
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y libjpeg-dev libpng-dev zlib1g-dev nasm

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Build webapp
        working-directory: webapp
        run: npm run build

      - name: Upload webapp artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: webapp/channels/dist/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: build-webapp
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Download webapp artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist
          path: webapp-dist/

      - name: Create webapp tarball
        run: tar czf webapp-dist.tar.gz -C webapp-dist .

      - name: SCP webapp to VPS
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            webapp-dist.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/webapp-dist.tar.gz

      - name: Inject secrets into VPS .env
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            ENV_FILE="${{ env.DEPLOY_PATH }}/.env"
            KEY_VALUE="TECHZEN_ENCRYPTION_KEY=${{ secrets.TECHZEN_ENCRYPTION_KEY }}"
            # Luôn update hoặc thêm mới (tránh bug key rỗng không được update)
            if grep -q '^TECHZEN_ENCRYPTION_KEY=' "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^TECHZEN_ENCRYPTION_KEY=.*|$KEY_VALUE|" "$ENV_FILE"
            else
              echo "$KEY_VALUE" >> "$ENV_FILE"
            fi
          ENDSSH

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "export DEPLOY_PATH='${{ env.DEPLOY_PATH }}' && \
             export DEPLOY_BRANCH='develop' && \
             bash ${{ env.DEPLOY_PATH }}/scripts/deploy.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Notify Mattermost
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON=":rocket:"; MSG="✅ Deploy thành công"
          else
            ICON=":red_circle:"; MSG="❌ Deploy thất bại"
          fi
          curl -s -X POST "${{ secrets.MM_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"GitHub Actions\",\"icon_emoji\":\"$ICON\",\"text\":\"$MSG | Branch: \`${{ github.ref_name }}\` | By: @${{ github.actor }}\"}" || true
