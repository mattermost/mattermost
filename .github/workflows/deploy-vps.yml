name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy'
        required: false
        default: 'false'

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/mattermost
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://${{ secrets.VPS_HOST }}:8065

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy files to VPS
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            scripts/deploy.sh scripts/rollback.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/scripts/

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "export DEPLOY_PATH='${{ env.DEPLOY_PATH }}' && \
             export COMPOSE_FILE='${{ env.COMPOSE_FILE }}' && \
             export MM_VERSION='latest' && \
             bash ${{ env.DEPLOY_PATH }}/scripts/deploy.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Notify Mattermost
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON=":rocket:"; MSG="✅ Deploy thành công"
          else
            ICON=":red_circle:"; MSG="❌ Deploy thất bại"
          fi
          curl -s -X POST "${{ secrets.MM_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"GitHub Actions\",\"icon_emoji\":\"$ICON\",\"text\":\"$MSG | Branch: \`${{ github.ref_name }}\` | By: @${{ github.actor }} | http://${{ secrets.VPS_HOST }}:8065\"}"
