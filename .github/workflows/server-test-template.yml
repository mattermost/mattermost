name: Server Test Template
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      datasource:
        required: true
        type: string
      drivername:
        required: true
        type: string
      logsartifact:
        required: true
        type: string
      fullyparallel:
        required: false
        type: boolean
        default: false
      enablecoverage:
        required: false
        type: boolean
        default: false
      go-version:
        required: true
        type: string
      fips-enabled:
        required: false
        default: false
        type: boolean
      # -- Test sharding inputs (leave defaults for non-sharded callers) --
      shard-index:
        required: false
        type: number
        default: -1 # -1 = no sharding; run all tests
      shard-total:
        required: false
        type: number
        default: 1

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest-8-cores
    continue-on-error: ${{ inputs.fullyparallel }} # Used to avoid blocking PRs in case of flakiness
    env:
      COMPOSE_PROJECT_NAME: ghactions
    steps:
      - name: buildenv/docker-login
        # Only FIPS requires login for private build container. (Forks won't have credentials.)
        if: inputs.fips-enabled
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout mattermost project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Test sharding ──────────────────────────────────────────────────
      # When shard-total > 1, we split individual test functions across N
      # parallel runners. Each shard gets a `-run` regex that selects its
      # portion of tests. This avoids the third-party hashicorp-forge action
      # (blocked by org Actions policy) by using only Go + shell.
      #
      # How it works:
      #   1. Grep test function names from source (no compilation needed).
      #   2. Optionally restore JUnit XML timing data from a previous run to
      #      weight tests by duration for balanced splitting.
      #   3. Assign tests to this shard using round-robin (by count) or
      #      greedy bin-packing (by timing), then emit a `-run` regex.
      # ─────────────────────────────────────────────────────────────────────

      - name: Restore test timing data
        if: inputs.shard-total > 1
        id: timing-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: server/prev-report.xml
          # Try branch-specific timing first, fall back to master
          key: server-test-timing-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            server-test-timing-master

      - name: Split tests across shards
        if: inputs.shard-total > 1
        id: test_split
        working-directory: server
        env:
          SHARD_INDEX: ${{ inputs.shard-index }}
          SHARD_TOTAL: ${{ inputs.shard-total }}
        run: |
          set -euo pipefail

          # ── Step 1: List all test functions ──
          # Grep test function names directly from source files. This is much
          # faster and more reliable than `go test -list` which requires full
          # compilation (needs CGO, system libs, etc. that the runner lacks).
          echo "::group::Listing all test functions"
          ALL_TESTS=$(grep -rh '^func Test' ./public/ ./ ./enterprise/ --include='*_test.go' 2>/dev/null \
            | sed -E 's/^func (Test[A-Za-z0-9_]+).*/\1/' \
            | sort -u || true)
          TOTAL_TESTS=$(echo "$ALL_TESTS" | wc -l)
          echo "Found $TOTAL_TESTS test functions"
          echo "::endgroup::"

          if [[ "$TOTAL_TESTS" -eq 0 ]]; then
            echo "WARNING: No tests found, shard will run nothing"
            echo "run=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Step 2: Try timing-based split (greedy bin-packing) ──
          # If we have JUnit XML from a previous run, parse test durations and
          # assign tests to shards using greedy bin-packing: always assign the
          # next-heaviest test to the shard with the least total time. This
          # balances wall-clock time across shards much better than round-robin.
          TIMING_FILE="prev-report.xml"
          if [[ -f "$TIMING_FILE" ]]; then
            echo "::group::Timing-based shard splitting (greedy bin-packing)"

            # Extract test name + duration from JUnit XML <testcase> elements.
            # Format: "duration testname" sorted by duration descending (heaviest first).
            # Uses grep+sed because we can't depend on xmllint in the runner image.
            TIMING_DATA=$(grep -oP '<testcase[^>]*name="([^"]*)"[^>]*time="([^"]*)"' "$TIMING_FILE" \
              | sed -E 's/<testcase[^>]*name="([^"]*)"[^>]*time="([^"]*)"/\2 \1/' \
              | sort -rn || true)

            if [[ -n "$TIMING_DATA" ]]; then
              # Build an associative map of test→duration from JUnit data
              declare -A TEST_TIMES
              while IFS=' ' read -r duration name; do
                TEST_TIMES["$name"]="$duration"
              done <<< "$TIMING_DATA"

              # Initialize shard load counters (integer milliseconds for shell arithmetic)
              declare -a SHARD_LOAD
              for ((i=0; i<SHARD_TOTAL; i++)); do SHARD_LOAD[$i]=0; done

              # Greedy bin-packing: for each test (heaviest first by timing,
              # then unknown tests last with default weight), assign to the
              # shard with the smallest total load.
              declare -a MY_TESTS=()

              # Sort all tests: timed tests by duration desc, then untimed tests
              SORTED_TESTS=""
              UNTIMED_TESTS=""
              while IFS= read -r test_name; do
                if [[ -n "${TEST_TIMES[$test_name]+x}" ]]; then
                  SORTED_TESTS+="${TEST_TIMES[$test_name]} ${test_name}"$'\n'
                else
                  UNTIMED_TESTS+="0.001 ${test_name}"$'\n'
                fi
              done <<< "$ALL_TESTS"

              # Combine: timed (sorted heaviest first) then untimed
              COMBINED=$(echo -n "$SORTED_TESTS" | sort -rn; echo -n "$UNTIMED_TESTS")

              while IFS=' ' read -r duration test_name; do
                [[ -z "$test_name" ]] && continue
                # Convert duration to integer milliseconds for comparison
                ms=$(echo "$duration" | awk '{printf "%d", $1 * 1000}')

                # Find the shard with the smallest load
                min_shard=0
                min_load=${SHARD_LOAD[0]}
                for ((i=1; i<SHARD_TOTAL; i++)); do
                  if [[ ${SHARD_LOAD[$i]} -lt $min_load ]]; then
                    min_shard=$i
                    min_load=${SHARD_LOAD[$i]}
                  fi
                done

                # Assign test to that shard
                SHARD_LOAD[$min_shard]=$((${SHARD_LOAD[$min_shard]} + ms))
                if [[ $min_shard -eq $SHARD_INDEX ]]; then
                  MY_TESTS+=("$test_name")
                fi
              done <<< "$COMBINED"

              echo "Shard $SHARD_INDEX: ${#MY_TESTS[@]} tests (load: ${SHARD_LOAD[$SHARD_INDEX]}ms)"
              for ((i=0; i<SHARD_TOTAL; i++)); do
                echo "  Shard $i load: ${SHARD_LOAD[$i]}ms"
              done
              echo "::endgroup::"

              if [[ ${#MY_TESTS[@]} -gt 0 ]]; then
                # Build a -run regex: ^(Test1|Test2|Test3)$
                # Escape any regex metacharacters in test names
                RUN_REGEX="^($(IFS='|'; echo "${MY_TESTS[*]}"))\$"
                echo "run=${RUN_REGEX}" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "run=" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            echo "::endgroup::"
          fi

          # ── Step 3: Fallback — round-robin by test count ──
          # No timing data available. Simply deal tests to shards like cards:
          # test 0 → shard 0, test 1 → shard 1, ..., test N → shard (N % total).
          echo "::group::Count-based shard splitting (round-robin)"
          MY_TESTS=()
          INDEX=0
          while IFS= read -r test_name; do
            [[ -z "$test_name" ]] && continue
            if [[ $((INDEX % SHARD_TOTAL)) -eq $SHARD_INDEX ]]; then
              MY_TESTS+=("$test_name")
            fi
            INDEX=$((INDEX + 1))
          done <<< "$ALL_TESTS"

          echo "Shard $SHARD_INDEX: ${#MY_TESTS[@]} of $TOTAL_TESTS tests (round-robin)"
          echo "::endgroup::"

          if [[ ${#MY_TESTS[@]} -gt 0 ]]; then
            RUN_REGEX="^($(IFS='|'; echo "${MY_TESTS[*]}"))\$"
            echo "run=${RUN_REGEX}" >> "$GITHUB_OUTPUT"
          else
            echo "run=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup BUILD_IMAGE
        id: build
        run: |
          if [[ ${{ inputs.fips-enabled }} == 'true' ]]; then
            echo "BUILD_IMAGE=mattermost/mattermost-build-server-fips:${{ inputs.go-version }}" >> "${GITHUB_OUTPUT}"
            echo "LOG_ARTIFACT_NAME=${{ inputs.logsartifact }}-fips" >> "${GITHUB_OUTPUT}"
          else
            echo "BUILD_IMAGE=mattermost/mattermost-build-server:${{ inputs.go-version }}" >> "${GITHUB_OUTPUT}"
            echo "LOG_ARTIFACT_NAME=${{ inputs.logsartifact }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Store required variables for publishing results
        run: |
          echo "${{ inputs.name }}" > server/test-name
          echo "${{ github.event.pull_request.number }}" > server/pr-number

      - name: Run docker compose
        run: |
          cd server/build
          docker compose --ansi never run --rm start_dependencies
          cat ../tests/custom-schema-objectID.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -Y EXTERNAL -H ldapi:/// -w mostest || true';
          cat ../tests/custom-schema-cpa.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -Y EXTERNAL -H ldapi:/// -w mostest || true';
          cat ../tests/test-data.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -x -D "cn=admin,dc=mm,dc=test,dc=com" -w mostest';
          docker compose --ansi never exec -T minio sh -c 'mkdir -p /data/mattermost-test';
          docker compose --ansi never ps

      - name: Run Tests
        env:
          BUILD_IMAGE: ${{ steps.build.outputs.BUILD_IMAGE }}
        run: |
          if [[ ${{ github.ref_name }} == 'master' && ${{ inputs.fullyparallel }} != true ]]; then
            export RACE_MODE="-race"
          fi

          # When sharding is active, pass -run regex via the Make GOFLAGS variable
          # to filter this shard's tests. This is safe because Make command-line
          # variables are not exported as env vars, so `go list` (used to compute
          # TE_PACKAGES/EE_PACKAGES) won't see the -run flag.
          SHARD_RUN_FLAG=""
          if [[ "${{ inputs.shard-total }}" -gt 1 ]]; then
            SHARD_RUN_FLAG="-run '${{ steps.test_split.outputs.run }}'"
          fi

          docker run --net ghactions_mm-test \
            --ulimit nofile=8096:8096 \
            --env-file=server/build/dotenv/test.env \
            --env MM_SQLSETTINGS_DRIVERNAME="${{ inputs.drivername }}" \
            --env MM_SQLSETTINGS_DATASOURCE="${{ inputs.datasource }}" \
            --env TEST_DATABASE_POSTGRESQL_DSN="${{ inputs.datasource }}" \
            --env ENABLE_FULLY_PARALLEL_TESTS="${{ inputs.fullyparallel }}" \
            --env ENABLE_COVERAGE="${{ inputs.enablecoverage }}" \
            --env FIPS_ENABLED="${{ inputs.fips-enabled }}" \
            -v $PWD:/mattermost \
            -w /mattermost/server \
            $BUILD_IMAGE \
            make test-server$RACE_MODE BUILD_NUMBER=$GITHUB_HEAD_REF-$GITHUB_RUN_ID GOFLAGS="${SHARD_RUN_FLAG}"

      - name: Upload coverage to Codecov
        if: ${{ inputs.enablecoverage }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: server/cover.out

      - name: Stop docker compose
        run: |
          cd server/build
          docker compose --ansi never stop

      - name: Archive logs
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.build.outputs.LOG_ARTIFACT_NAME }}
          path: |
            server/gotestsum.json
            server/report.xml
            server/cover.out
            server/test-name
            server/pr-number
