name: Server Test Template
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      datasource:
        required: true
        type: string
      drivername:
        required: true
        type: string
      logsartifact:
        required: true
        type: string
      fullyparallel:
        required: false
        type: boolean
        default: false
      enablecoverage:
        required: false
        type: boolean
        default: false
      go-version:
        required: true
        type: string
      fips-enabled:
        required: false
        default: false
        type: boolean
      # -- Test sharding inputs (leave defaults for non-sharded callers) --
      shard-index:
        required: false
        type: number
        default: -1 # -1 = no sharding; run all tests
      shard-total:
        required: false
        type: number
        default: 1

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest-8-cores
    continue-on-error: ${{ inputs.fullyparallel }} # Used to avoid blocking PRs in case of flakiness
    env:
      COMPOSE_PROJECT_NAME: ghactions
    steps:
      - name: buildenv/docker-login
        # Only FIPS requires login for private build container. (Forks won't have credentials.)
        if: inputs.fips-enabled
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout mattermost project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Package-level test sharding ────────────────────────────────────
      # When shard-total > 1, we split Go test packages across N parallel
      # runners. Each shard overrides TE_PACKAGES and EE_PACKAGES in the
      # Makefile to run only its assigned packages.
      #
      # How it works:
      #   1. List all Go test packages via `go list` inside the build container.
      #   2. Optionally use JUnit XML timing data from a previous run to
      #      estimate package durations for balanced splitting.
      #   3. Assign packages to this shard using greedy bin-packing (by timing)
      #      or round-robin (fallback), then output filtered package lists.
      #
      # Why package-level (not test-level)?
      #   The Makefile passes $(GOFLAGS) unquoted to /bin/sh, so -run regexes
      #   containing shell metacharacters (|, (, ), $) cause syntax errors.
      #   Package names are plain Go import paths — no shell metacharacters.
      # ─────────────────────────────────────────────────────────────────────

      - name: Restore test timing data
        if: inputs.shard-total > 1
        id: timing-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: server/prev-report.xml
          # Try branch-specific timing first, fall back to master
          key: server-test-timing-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            server-test-timing-master

      - name: Split packages across shards
        if: inputs.shard-total > 1
        id: test_split
        working-directory: server
        env:
          SHARD_INDEX: ${{ inputs.shard-index }}
          SHARD_TOTAL: ${{ inputs.shard-total }}
        run: |
          set -euo pipefail

          # ── Step 1: List all test packages ──
          # Use grep to find directories containing test files, then convert
          # to Go import paths. Faster and more reliable than `go list` which
          # requires full module setup.
          echo "::group::Listing test packages"

          # Find all _test.go files, extract unique directories, convert to
          # Go-style import paths relative to module root
          TE_PKGS=$(find ./public/ ./ -name '*_test.go' -not -path './enterprise/*' -not -path './cmd/mmctl/*' 2>/dev/null \
            | sed 's|/[^/]*$||' | sort -u \
            | sed 's|^\./|github.com/mattermost/mattermost/server/v8/|' \
            | sed 's|github.com/mattermost/mattermost/server/v8/public/|github.com/mattermost/mattermost/server/public/|')

          EE_PKGS=$(find ./enterprise/ -name '*_test.go' 2>/dev/null \
            | sed 's|/[^/]*$||' | sort -u \
            | sed 's|^\./|github.com/mattermost/mattermost/server/v8/|')

          # Combine all packages for sharding
          ALL_PKGS=$(echo "$TE_PKGS"; echo "$EE_PKGS")
          ALL_PKGS=$(echo "$ALL_PKGS" | grep -v '^$' | sort -u)
          TOTAL_PKGS=$(echo "$ALL_PKGS" | wc -l)
          echo "Found $TOTAL_PKGS test packages"
          echo "::endgroup::"

          if [[ "$TOTAL_PKGS" -eq 0 ]]; then
            echo "WARNING: No test packages found, shard will run nothing"
            echo "te_packages=" >> "$GITHUB_OUTPUT"
            echo "ee_packages=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Step 2: Try timing-based split (greedy bin-packing) ──
          # If we have JUnit XML from a previous run, aggregate test durations
          # per package and use greedy bin-packing to balance wall-clock time.
          TIMING_FILE="prev-report.xml"
          USE_TIMING=false
          declare -A PKG_TIMES

          if [[ -f "$TIMING_FILE" ]]; then
            echo "::group::Extracting package timing from JUnit XML"

            # JUnit XML <testsuite> elements have name="pkg" and time="seconds"
            # Extract package-level durations
            while IFS=' ' read -r duration pkg; do
              [[ -z "$pkg" ]] && continue
              # Accumulate time per package (multiple testsuites per package possible)
              ms=$(awk "BEGIN {printf \"%d\", $duration * 1000}")
              PKG_TIMES["$pkg"]=$(( ${PKG_TIMES["$pkg"]:-0} + ms ))
            done < <(grep -oP '<testsuite[^>]*name="([^"]*)"[^>]*time="([^"]*)"' "$TIMING_FILE" \
              | sed -E 's/<testsuite[^>]*name="([^"]*)"[^>]*time="([^"]*)"/\2 \1/' || true)

            if [[ ${#PKG_TIMES[@]} -gt 0 ]]; then
              USE_TIMING=true
              echo "Found timing data for ${#PKG_TIMES[@]} packages"
            fi
            echo "::endgroup::"
          fi

          # ── Step 3: Assign packages to shards ──
          echo "::group::Assigning packages to shard $SHARD_INDEX of $SHARD_TOTAL"

          # Initialize shard load counters
          declare -a SHARD_LOAD
          for ((i=0; i<SHARD_TOTAL; i++)); do SHARD_LOAD[$i]=0; done

          declare -a MY_PKGS=()

          if [[ "$USE_TIMING" == "true" ]]; then
            # Greedy bin-packing: sort packages by duration desc, assign each
            # to the shard with the smallest total load
            SORTED_PKGS=""
            while IFS= read -r pkg; do
              [[ -z "$pkg" ]] && continue
              ms=${PKG_TIMES["$pkg"]:-1}
              SORTED_PKGS+="${ms} ${pkg}"$'\n'
            done <<< "$ALL_PKGS"

            SORTED_PKGS=$(echo -n "$SORTED_PKGS" | sort -rn)

            while IFS=' ' read -r ms pkg; do
              [[ -z "$pkg" ]] && continue

              # Find shard with smallest load
              min_shard=0
              min_load=${SHARD_LOAD[0]}
              for ((i=1; i<SHARD_TOTAL; i++)); do
                if [[ ${SHARD_LOAD[$i]} -lt $min_load ]]; then
                  min_shard=$i
                  min_load=${SHARD_LOAD[$i]}
                fi
              done

              SHARD_LOAD[$min_shard]=$(( ${SHARD_LOAD[$min_shard]} + ms ))
              if [[ $min_shard -eq $SHARD_INDEX ]]; then
                MY_PKGS+=("$pkg")
              fi
            done <<< "$SORTED_PKGS"

            echo "Timing-based assignment:"
          else
            # Round-robin fallback
            INDEX=0
            while IFS= read -r pkg; do
              [[ -z "$pkg" ]] && continue
              if [[ $((INDEX % SHARD_TOTAL)) -eq $SHARD_INDEX ]]; then
                MY_PKGS+=("$pkg")
              fi
              INDEX=$((INDEX + 1))
            done <<< "$ALL_PKGS"

            echo "Round-robin assignment:"
          fi

          echo "Shard $SHARD_INDEX: ${#MY_PKGS[@]} of $TOTAL_PKGS packages"
          for ((i=0; i<SHARD_TOTAL; i++)); do
            echo "  Shard $i: load=${SHARD_LOAD[$i]}ms"
          done
          echo "::endgroup::"

          # ── Step 4: Split into TE and EE package lists ──
          # The Makefile uses separate TE_PACKAGES and EE_PACKAGES variables.
          SHARD_TE=""
          SHARD_EE=""
          for pkg in "${MY_PKGS[@]}"; do
            if [[ "$pkg" == *"/enterprise/"* ]]; then
              SHARD_EE+="$pkg "
            else
              SHARD_TE+="$pkg "
            fi
          done

          # Trim trailing space
          SHARD_TE="${SHARD_TE% }"
          SHARD_EE="${SHARD_EE% }"

          echo "TE packages: $(echo "$SHARD_TE" | wc -w) | EE packages: $(echo "$SHARD_EE" | wc -w)"

          # Write package lists to files. The Run Tests step reads these
          # and passes them as Make variable overrides. Files avoid the
          # quoting/escaping issues of passing long lists through GHA outputs.
          echo "$SHARD_TE" > shard-te-packages.txt
          echo "$SHARD_EE" > shard-ee-packages.txt
          echo "has_packages=true" >> "$GITHUB_OUTPUT"

      - name: Setup BUILD_IMAGE
        id: build
        run: |
          if [[ ${{ inputs.fips-enabled }} == 'true' ]]; then
            echo "BUILD_IMAGE=mattermost/mattermost-build-server-fips:${{ inputs.go-version }}" >> "${GITHUB_OUTPUT}"
            echo "LOG_ARTIFACT_NAME=${{ inputs.logsartifact }}-fips" >> "${GITHUB_OUTPUT}"
          else
            echo "BUILD_IMAGE=mattermost/mattermost-build-server:${{ inputs.go-version }}" >> "${GITHUB_OUTPUT}"
            echo "LOG_ARTIFACT_NAME=${{ inputs.logsartifact }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Store required variables for publishing results
        run: |
          echo "${{ inputs.name }}" > server/test-name
          echo "${{ github.event.pull_request.number }}" > server/pr-number

      - name: Run docker compose
        run: |
          cd server/build
          docker compose --ansi never run --rm start_dependencies
          cat ../tests/custom-schema-objectID.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -Y EXTERNAL -H ldapi:/// -w mostest || true';
          cat ../tests/custom-schema-cpa.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -Y EXTERNAL -H ldapi:/// -w mostest || true';
          cat ../tests/test-data.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -x -D "cn=admin,dc=mm,dc=test,dc=com" -w mostest';
          docker compose --ansi never exec -T minio sh -c 'mkdir -p /data/mattermost-test';
          docker compose --ansi never ps

      - name: Run Tests
        env:
          BUILD_IMAGE: ${{ steps.build.outputs.BUILD_IMAGE }}
        run: |
          if [[ ${{ github.ref_name }} == 'master' && ${{ inputs.fullyparallel }} != true ]]; then
            export RACE_MODE="-race"
          fi

          # When sharding, override TE_PACKAGES and EE_PACKAGES so Make only
          # runs this shard's packages. We read the lists from files written by
          # the split step, and pass them as Make variable overrides.
          # Package names are plain Go import paths — no shell metacharacters.
          #
          # We write a small wrapper script to preserve quoting of the
          # space-separated package lists through the docker exec boundary.
          MAKE_CMD="make test-server${RACE_MODE} BUILD_NUMBER=${GITHUB_HEAD_REF}-${GITHUB_RUN_ID}"
          if [[ "${{ inputs.shard-total }}" -gt 1 && -f server/shard-te-packages.txt ]]; then
            SHARD_TE=$(cat server/shard-te-packages.txt)
            SHARD_EE=$(cat server/shard-ee-packages.txt)
            cat > server/run-shard-tests.sh <<SHARDEOF
#!/bin/bash
exec make test-server${RACE_MODE} BUILD_NUMBER=${GITHUB_HEAD_REF}-${GITHUB_RUN_ID} TE_PACKAGES="${SHARD_TE}" EE_PACKAGES="${SHARD_EE}"
SHARDEOF
            chmod +x server/run-shard-tests.sh
            MAKE_CMD="/mattermost/server/run-shard-tests.sh"
          fi

          docker run --net ghactions_mm-test \
            --ulimit nofile=8096:8096 \
            --env-file=server/build/dotenv/test.env \
            --env MM_SQLSETTINGS_DRIVERNAME="${{ inputs.drivername }}" \
            --env MM_SQLSETTINGS_DATASOURCE="${{ inputs.datasource }}" \
            --env TEST_DATABASE_POSTGRESQL_DSN="${{ inputs.datasource }}" \
            --env ENABLE_FULLY_PARALLEL_TESTS="${{ inputs.fullyparallel }}" \
            --env ENABLE_COVERAGE="${{ inputs.enablecoverage }}" \
            --env FIPS_ENABLED="${{ inputs.fips-enabled }}" \
            -v $PWD:/mattermost \
            -w /mattermost/server \
            $BUILD_IMAGE \
            $MAKE_CMD

      - name: Upload coverage to Codecov
        if: ${{ inputs.enablecoverage }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: server/cover.out

      - name: Stop docker compose
        run: |
          cd server/build
          docker compose --ansi never stop

      - name: Archive logs
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.build.outputs.LOG_ARTIFACT_NAME }}
          path: |
            server/gotestsum.json
            server/report.xml
            server/cover.out
            server/test-name
            server/pr-number
