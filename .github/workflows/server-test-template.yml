name: Server Test Template
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      datasource:
        required: true
        type: string
      drivername:
        required: true
        type: string
      logsartifact:
        required: true
        type: string
      fullyparallel:
        required: false
        type: boolean
        default: false
      enablecoverage:
        required: false
        type: boolean
        default: false
      go-version:
        required: true
        type: string
      fips-enabled:
        required: false
        default: false
        type: boolean
      # -- Test sharding inputs (leave defaults for non-sharded callers) --
      shard-index:
        required: false
        type: number
        default: -1 # -1 = no sharding; run all tests
      shard-total:
        required: false
        type: number
        default: 1

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest-8-cores
    continue-on-error: ${{ inputs.fullyparallel }} # Used to avoid blocking PRs in case of flakiness
    env:
      COMPOSE_PROJECT_NAME: ghactions
    steps:
      - name: buildenv/docker-login
        # Only FIPS requires login for private build container. (Forks won't have credentials.)
        if: inputs.fips-enabled
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout mattermost project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Test-level sharding ────────────────────────────────────────────
      # When shard-total > 1, we split tests across N parallel runners.
      #
      # Two-tier splitting strategy:
      #   - "Light" packages (< 2 min): assigned whole to a shard
      #   - "Heavy" packages (≥ 2 min, e.g. api4, app): individual tests
      #     are distributed across shards using -run regex filters
      #
      # Timing data comes from a cached gotestsum.json (JSONL with per-test
      # Elapsed times) from the previous run. Falls back to JUnit XML
      # package-level timing, then round-robin if no timing data exists.
      #
      # Each shard generates a wrapper script that calls gotestsum directly
      # (bypassing the Makefile) to support multiple invocations: one for
      # light packages and one per heavy-package split.
      # ─────────────────────────────────────────────────────────────────────

      - name: Restore test timing data
        if: inputs.shard-total > 1
        id: timing-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            server/prev-report.xml
            server/prev-gotestsum.json
          # Try branch-specific timing first, fall back to master
          key: server-test-timing-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            server-test-timing-master

      - name: Split tests across shards
        if: inputs.shard-total > 1
        id: test_split
        working-directory: server
        env:
          SHARD_INDEX: ${{ inputs.shard-index }}
          SHARD_TOTAL: ${{ inputs.shard-total }}
        run: |
          set -euo pipefail

          # ── Step 1: List all test packages ──
          echo "::group::Listing test packages"
          TE_PKGS=$(find ./public/ ./ -name '*_test.go' -not -path './enterprise/*' -not -path './cmd/mmctl/*' 2>/dev/null \
            | sed 's|/[^/]*$||' | sort -u \
            | sed 's|^\./|github.com/mattermost/mattermost/server/v8/|' \
            | sed 's|github.com/mattermost/mattermost/server/v8/public/|github.com/mattermost/mattermost/server/public/|')
          EE_PKGS=$(find ./enterprise/ -name '*_test.go' 2>/dev/null \
            | sed 's|/[^/]*$||' | sort -u \
            | sed 's|^\./|github.com/mattermost/mattermost/server/v8/|')
          ALL_PKGS=$(printf '%s\n%s' "$TE_PKGS" "$EE_PKGS" | grep -v '^$' | sort -u)
          TOTAL_PKGS=$(echo "$ALL_PKGS" | wc -l)
          echo "Found $TOTAL_PKGS test packages"
          echo "::endgroup::"

          if [[ "$TOTAL_PKGS" -eq 0 ]]; then
            echo "WARNING: No test packages found"
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$ALL_PKGS" > all-packages.txt

          # ── Step 2: Use Node.js for fast timing parse + shard assignment ──
          # Node is pre-installed on ubuntu runners and handles JSON/XML
          # parsing orders of magnitude faster than bash loops.
          node -e '
          const fs = require("fs");

          const SHARD_INDEX = parseInt(process.env.SHARD_INDEX);
          const SHARD_TOTAL = parseInt(process.env.SHARD_TOTAL);
          const HEAVY_MS = 120000; // 2 min: packages above this get test-level splitting

          const allPkgs = fs.readFileSync("all-packages.txt", "utf8").trim().split("\n");
          const pkgTimes = {};
          const testTimes = {}; // "pkg::TestName" -> ms

          // ── Parse gotestsum.json (JSONL) for per-test timing ──
          // This gives us Elapsed time per top-level test function.
          if (fs.existsSync("prev-gotestsum.json")) {
            console.log("::group::Parsing gotestsum.json timing data");
            const lines = fs.readFileSync("prev-gotestsum.json", "utf8").split("\n");
            for (const line of lines) {
              if (!line.includes("\"pass\"")) continue;
              try {
                const d = JSON.parse(line);
                if (!d.Test || !d.Package) continue;
                // Aggregate package time from test pass events
                const elapsed = Math.round((d.Elapsed || 0) * 1000);
                pkgTimes[d.Package] = (pkgTimes[d.Package] || 0) + elapsed;
                // Top-level test name (use max elapsed for parent vs subtests)
                const top = d.Test.split("/")[0];
                const key = d.Package + "::" + top;
                testTimes[key] = Math.max(testTimes[key] || 0, elapsed);
              } catch(e) {}
            }
            console.log("gotestsum.json: " + Object.keys(pkgTimes).length + " packages, " + Object.keys(testTimes).length + " tests");
            console.log("::endgroup::");
          }

          // ── Fallback: parse JUnit XML for package-level timing ──
          if (Object.keys(pkgTimes).length === 0 && fs.existsSync("prev-report.xml")) {
            console.log("::group::Parsing JUnit XML timing data (fallback)");
            const xml = fs.readFileSync("prev-report.xml", "utf8");
            for (const m of xml.matchAll(/<testsuite[^>]*>/g)) {
              const name = m[0].match(/name="([^"]+)"/)?.[1];
              const time = m[0].match(/\\btime="([^"]+)"/)?.[1];
              if (name && time) pkgTimes[name] = (pkgTimes[name] || 0) + Math.round(parseFloat(time) * 1000);
            }
            console.log("JUnit XML: " + Object.keys(pkgTimes).length + " packages (no per-test data)");
            console.log("::endgroup::");
          }

          const hasTimingData = Object.keys(pkgTimes).length > 0;
          const hasTestTiming = Object.keys(testTimes).length > 0;

          // ── Identify heavy packages ──
          const heavyPkgs = new Set();
          if (hasTestTiming) {
            for (const [pkg, ms] of Object.entries(pkgTimes)) {
              if (ms > HEAVY_MS) heavyPkgs.add(pkg);
            }
          }
          if (heavyPkgs.size > 0) {
            console.log("Heavy packages (test-level splitting):");
            for (const p of heavyPkgs) console.log("  " + (pkgTimes[p]/1000).toFixed(0) + "s  " + p.split("/").pop());
          }

          // ── Build work items ──
          const items = []; // {ms, type: "P"|"T", pkg, test?}
          for (const pkg of allPkgs) {
            if (!pkg) continue;
            if (heavyPkgs.has(pkg)) {
              // Split into individual test items
              const tests = Object.entries(testTimes)
                .filter(([k]) => k.startsWith(pkg + "::"))
                .map(([k, ms]) => ({ms, type: "T", pkg, test: k.split("::")[1]}));
              if (tests.length > 0) {
                items.push(...tests);
              } else {
                items.push({ms: pkgTimes[pkg] || 1, type: "P", pkg});
              }
            } else {
              items.push({ms: pkgTimes[pkg] || 1, type: "P", pkg});
            }
          }
          items.sort((a, b) => b.ms - a.ms);

          // ── Greedy bin-packing ──
          const shards = Array.from({length: SHARD_TOTAL}, () => ({load: 0, whole: [], heavy: {}}));

          if (!hasTimingData) {
            // Round-robin fallback when no timing data
            console.log("No timing data — using round-robin");
            allPkgs.forEach((pkg, i) => { if (pkg) shards[i % SHARD_TOTAL].whole.push(pkg); });
          } else {
            for (const item of items) {
              const min = shards.reduce((m, s, i) => s.load < shards[m].load ? i : m, 0);
              shards[min].load += item.ms;
              if (item.type === "P") {
                shards[min].whole.push(item.pkg);
              } else {
                if (!shards[min].heavy[item.pkg]) shards[min].heavy[item.pkg] = [];
                shards[min].heavy[item.pkg].push(item.test);
              }
            }
          }

          // ── Report ──
          console.log("::group::Shard assignment");
          for (let i = 0; i < SHARD_TOTAL; i++) {
            const s = shards[i];
            const hRuns = Object.keys(s.heavy).length;
            const hTests = Object.values(s.heavy).reduce((n, a) => n + a.length, 0);
            const marker = i === SHARD_INDEX ? " ← THIS SHARD" : "";
            console.log("Shard " + i + ": " + (s.load/1000).toFixed(1) + "s | " + s.whole.length + " pkgs" + (hRuns > 0 ? ", " + hRuns + " heavy splits (" + hTests + " tests)" : "") + marker);
          }
          console.log("::endgroup::");

          // ── Output for this shard ──
          const myShard = shards[SHARD_INDEX];
          const te = myShard.whole.filter(p => !p.includes("/enterprise/")).join(" ");
          const ee = myShard.whole.filter(p => p.includes("/enterprise/")).join(" ");

          fs.writeFileSync("shard-te-packages.txt", te);
          fs.writeFileSync("shard-ee-packages.txt", ee);

          // Heavy package runs: one line per run as "pkg REGEX"
          const heavyRuns = Object.entries(myShard.heavy).map(([pkg, tests]) => {
            const regex = tests.map(t => "^" + t + "$").join("|");
            return pkg + " " + regex;
          });
          fs.writeFileSync("shard-heavy-runs.txt", heavyRuns.join("\n"));

          console.log("Light packages: " + myShard.whole.length + " (" + te.split(" ").filter(Boolean).length + " TE, " + ee.split(" ").filter(Boolean).length + " EE)");
          console.log("Heavy package runs: " + heavyRuns.length);
          '

          echo "has_packages=true" >> "$GITHUB_OUTPUT"

      - name: Setup BUILD_IMAGE
        id: build
        run: |
          if [[ ${{ inputs.fips-enabled }} == 'true' ]]; then
            echo "BUILD_IMAGE=mattermost/mattermost-build-server-fips:${{ inputs.go-version }}" >> "${GITHUB_OUTPUT}"
            echo "LOG_ARTIFACT_NAME=${{ inputs.logsartifact }}-fips" >> "${GITHUB_OUTPUT}"
          else
            echo "BUILD_IMAGE=mattermost/mattermost-build-server:${{ inputs.go-version }}" >> "${GITHUB_OUTPUT}"
            echo "LOG_ARTIFACT_NAME=${{ inputs.logsartifact }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Store required variables for publishing results
        run: |
          echo "${{ inputs.name }}" > server/test-name
          echo "${{ github.event.pull_request.number }}" > server/pr-number

      - name: Run docker compose
        run: |
          cd server/build
          docker compose --ansi never run --rm start_dependencies
          cat ../tests/custom-schema-objectID.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -Y EXTERNAL -H ldapi:/// -w mostest || true';
          cat ../tests/custom-schema-cpa.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -Y EXTERNAL -H ldapi:/// -w mostest || true';
          cat ../tests/test-data.ldif | docker compose --ansi never exec -T openldap bash -c 'ldapadd -x -D "cn=admin,dc=mm,dc=test,dc=com" -w mostest';
          docker compose --ansi never exec -T minio sh -c 'mkdir -p /data/mattermost-test';
          docker compose --ansi never ps

      - name: Run Tests
        env:
          BUILD_IMAGE: ${{ steps.build.outputs.BUILD_IMAGE }}
        run: |
          if [[ ${{ github.ref_name }} == 'master' && ${{ inputs.fullyparallel }} != true ]]; then
            export RACE_MODE="-race"
          fi

          MAKE_ARGS="test-server${RACE_MODE} BUILD_NUMBER=${GITHUB_HEAD_REF}-${GITHUB_RUN_ID}"
          DOCKER_CMD="make ${MAKE_ARGS}"

          # When sharding with heavy package splits, generate a multi-run
          # wrapper script that calls gotestsum directly. This bypasses the
          # Makefile to support multiple gotestsum invocations (one per
          # heavy package subset + one for all light packages) with separate
          # JUnit/JSON output files that get merged at the end.
          if [[ "${{ inputs.shard-total }}" -gt 1 && -f server/shard-te-packages.txt ]]; then
            SHARD_TE=$(cat server/shard-te-packages.txt)
            SHARD_EE=$(cat server/shard-ee-packages.txt)
            HEAVY_RUNS=""
            if [[ -f server/shard-heavy-runs.txt && -s server/shard-heavy-runs.txt ]]; then
              HEAVY_RUNS=$(cat server/shard-heavy-runs.txt)
            fi

            if [[ -z "$HEAVY_RUNS" ]]; then
              # No heavy packages to split — simple single-run via Makefile
              printf '#!/bin/bash\nexec make %s TE_PACKAGES="%s" EE_PACKAGES="%s"\n' \
                "${MAKE_ARGS}" "${SHARD_TE}" "${SHARD_EE}" > server/run-shard-tests.sh
            else
              # Multi-run wrapper: calls gotestsum directly for each group
              {
                echo '#!/bin/bash'
                echo 'set -euo pipefail'
                echo ''
                echo '# Multi-run shard test script (auto-generated)'
                echo '# Calls gotestsum directly to support per-package -run filters.'
                echo 'GOBIN="$(pwd)/bin"'
                echo 'GOFLAGS_BASE="-buildvcs=false -timeout=90m"'
                echo 'COVERAGE_FLAG=""'
                echo 'if [[ "${ENABLE_COVERAGE:-false}" == "true" ]]; then'
                echo '  COVERAGE_FLAG="-coverprofile=cover-$RUN_IDX.out -covermode=atomic"'
                echo 'fi'
                echo 'RACE_FLAG="${RACE_MODE:-}"'
                echo ''
                echo 'RUN_IDX=0'
                echo '# run_gotestsum PACKAGES [RUN_REGEX]'
                echo '# $1 = space-separated package list'
                echo '# $2 = optional -run regex (no quotes needed, passed directly)'
                echo 'run_gotestsum() {'
                echo '  local junitfile="report-${RUN_IDX}.xml"'
                echo '  local jsonfile="gotestsum-${RUN_IDX}.json"'
                echo '  local run_flag=""'
                echo '  if [[ -n "${2:-}" ]]; then run_flag="-run $2"; fi'
                echo '  RUN_IDX=$((RUN_IDX + 1))'
                echo '  GOTESTSUM_JUNITFILE="$junitfile" GOTESTSUM_JSONFILE="$jsonfile" \'
                echo '    "$GOBIN/gotestsum" --rerun-fails=3 --packages="$1" -- $GOFLAGS_BASE $RACE_FLAG $COVERAGE_FLAG $run_flag'
                echo '}'
                echo ''

                # Light packages (single run, no -run filter)
                ALL_LIGHT="${SHARD_TE} ${SHARD_EE}"
                ALL_LIGHT="${ALL_LIGHT## }"
                ALL_LIGHT="${ALL_LIGHT%% }"
                if [[ -n "$ALL_LIGHT" ]]; then
                  LIGHT_COUNT=$(echo "$ALL_LIGHT" | wc -w)
                  echo "# Light packages ($LIGHT_COUNT packages)"
                  echo "run_gotestsum \"$ALL_LIGHT\""
                  echo ''
                fi

                # Heavy package runs (each with -run filter)
                while IFS= read -r line; do
                  [[ -z "$line" ]] && continue
                  PKG="${line%% *}"
                  REGEX="${line#* }"
                  SHORT_PKG="${PKG##*/}"
                  TEST_COUNT=$(echo "$REGEX" | tr '|' '\n' | wc -l)
                  echo "# Heavy: $SHORT_PKG ($TEST_COUNT tests)"
                  echo "run_gotestsum \"$PKG\" \"$REGEX\""
                  echo ''
                done <<< "$HEAVY_RUNS"

                # Merge results at the end
                echo '# Merge JUnit XMLs and JSON logs from all runs'
                echo 'if ls report-*.xml 1>/dev/null 2>&1; then'
                echo '  # Simple concatenation works for the merge job (uses junit-report-merger later)'
                echo '  head -1 report-0.xml > report.xml'  # XML header
                echo '  echo "<testsuites>" >> report.xml'
                echo '  for f in report-*.xml; do'
                echo '    grep -v "<?xml" "$f" | grep -v "^<testsuites" | grep -v "^</testsuites" >> report.xml || true'
                echo '  done'
                echo '  echo "</testsuites>" >> report.xml'
                echo 'fi'
                echo 'cat gotestsum-*.json > gotestsum.json 2>/dev/null || true'
                echo ''
                echo 'echo "Shard complete: $RUN_IDX gotestsum runs"'
              } > server/run-shard-tests.sh
            fi

            chmod +x server/run-shard-tests.sh
            DOCKER_CMD="/mattermost/server/run-shard-tests.sh"
          fi

          docker run --net ghactions_mm-test \
            --ulimit nofile=8096:8096 \
            --env-file=server/build/dotenv/test.env \
            --env MM_SQLSETTINGS_DRIVERNAME="${{ inputs.drivername }}" \
            --env MM_SQLSETTINGS_DATASOURCE="${{ inputs.datasource }}" \
            --env TEST_DATABASE_POSTGRESQL_DSN="${{ inputs.datasource }}" \
            --env ENABLE_FULLY_PARALLEL_TESTS="${{ inputs.fullyparallel }}" \
            --env ENABLE_COVERAGE="${{ inputs.enablecoverage }}" \
            --env FIPS_ENABLED="${{ inputs.fips-enabled }}" \
            -v $PWD:/mattermost \
            -w /mattermost/server \
            $BUILD_IMAGE \
            $DOCKER_CMD

      - name: Upload coverage to Codecov
        if: ${{ inputs.enablecoverage }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: server/cover.out

      - name: Stop docker compose
        run: |
          cd server/build
          docker compose --ansi never stop

      - name: Archive logs
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.build.outputs.LOG_ARTIFACT_NAME }}
          path: |
            server/gotestsum.json
            server/report.xml
            server/cover.out
            server/test-name
            server/pr-number
