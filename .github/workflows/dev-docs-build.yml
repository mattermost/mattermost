name: Developer Docs Build

on:
  push:
    branches:
      - master
    paths:
      - 'docs/developer/**'
  pull_request:
    paths:
      - 'docs/developer/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: docs/developer
    steps:
      - name: ci/checkout-code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ci/setup-go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version-file: docs/developer/go.mod

      - name: ci/run-build
        run: make dist

      - name: ci/check-html
        run: make test

      - name: ci/persist-artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dev-docs
          path: docs/developer/dist/html
          retention-days: 1
