---
name: "Tests/verified"

on:
  pull_request:
    types: [labeled]

concurrency:
  group: test-analyzer-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  statuses: write

env:
  OVERRIDE_LABEL: "Tests/verified"
  VERIFIED_PREFIX: "(verified)"
  STATUS_CONTEXT: "Tests/analysis"
  REPORT_WEBHOOK_URL: ${{ secrets.MM_E2E_REPORT_WEBHOOK_URL }}

jobs:
  # When Tests/verified label is applied, post success status overriding the previous analysis
  # and send a webhook notification to the channel.
  verify:
    if: >-
      github.event.label.name == 'Tests/verified' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      # Verify label still exists — it may have been removed by a concurrent analysis run
      - name: ci/check-label-still-present
        id: label-check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CURRENT_LABELS=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/labels 2>/dev/null || echo '[]')
          HAS_LABEL=$(echo "$CURRENT_LABELS" | jq -r --arg label "$OVERRIDE_LABEL" '.[] | select(.name == $label) | .name' 2>/dev/null || true)
          if [ -z "$HAS_LABEL" ]; then
            echo "Label ${OVERRIDE_LABEL} no longer present — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: ci/check-permission
        if: steps.label-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL_AUTHOR: ${{ github.event.sender.login }}
        run: |
          PERMISSION=$(gh api repos/${{ github.repository }}/collaborators/${LABEL_AUTHOR}/permission --jq '.permission' 2>/dev/null || echo "none")
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
            echo "User ${LABEL_AUTHOR} doesn't have write permission (permission: ${PERMISSION})"
            exit 1
          fi
          echo "User ${LABEL_AUTHOR} has ${PERMISSION} permission"

      - name: ci/post-verified-status
        if: steps.label-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Read current commit status to preserve description
          STATUS_JSON=$(gh api repos/${{ github.repository }}/commits/${COMMIT_SHA}/statuses \
            --jq "[.[] | select(.context == \"${STATUS_CONTEXT}\")] | first // empty")

          CURRENT_DESC=""
          CURRENT_URL=""
          if [ -n "$STATUS_JSON" ]; then
            CURRENT_DESC=$(echo "$STATUS_JSON" | jq -r '.description // ""')
            CURRENT_URL=$(echo "$STATUS_JSON" | jq -r '.target_url // ""')
          fi

          # Strip any existing prefix to avoid stacking on repeated runs
          ESCAPED_PREFIX=$(echo "$VERIFIED_PREFIX" | sed 's/[()]/\\&/g')
          CLEAN_DESC=$(echo "$CURRENT_DESC" | sed "s/^${ESCAPED_PREFIX} *//")
          if [ -n "$CLEAN_DESC" ]; then
            NEW_DESC="${VERIFIED_PREFIX} ${CLEAN_DESC}"
          else
            NEW_DESC="${VERIFIED_PREFIX}"
          fi

          gh api repos/${{ github.repository }}/statuses/${COMMIT_SHA} \
            -f state=success \
            -f context="${STATUS_CONTEXT}" \
            -f description="${NEW_DESC:0:140}" \
            -f target_url="${CURRENT_URL:-${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"

          echo "Verified: ${NEW_DESC}"

      - name: ci/send-webhook
        if: steps.label-check.outputs.skip != 'true' && env.REPORT_WEBHOOK_URL != ''
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          PAYLOAD=$(jq -n \
            --arg sender "$SENDER" \
            --arg label "$OVERRIDE_LABEL" \
            --arg pr_num "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            --arg commit "${COMMIT_SHA:0:7}" \
            '{
              username: "Test Check",
              icon_url: "https://mattermost.com/wp-content/uploads/2022/02/icon_WS.png",
              text: "**Tests/verified applied**\n\nBy: `@\($sender)` via `\($label)` label\n[mattermost-pr-\($pr_num)](\($pr_url)), commit: `\($commit)`"
            }')

          curl -sS --max-time 30 -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$REPORT_WEBHOOK_URL"
