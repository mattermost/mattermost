---
name: Agentic QA (Execute)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      head_sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        type: number
      head_sha:
        required: false
        type: string

permissions: {}

jobs:
  execute:
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve head SHA
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR="${{ inputs.pr_number }}"
          if [ -n "${{ inputs.head_sha }}" ]; then
            SHA="${{ inputs.head_sha }}"
          else
            SHA=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
          fi
          echo "head_sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Download qa-result
        uses: actions/download-artifact@6f51ac45b3396a0f6a4a2a1863cafe909e1483c6 # v4.5.0
        continue-on-error: true
        with:
          name: qa-result-pr-${{ inputs.pr_number }}
          path: /tmp/amqa

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Agent execution via Claude (verification plan)
        id: claude
        if: ${{ secrets.ANTHROPIC_API_KEY != '' && vars.AMQA_DRY_RUN != 'true' }}
        uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44 # v1.0.70
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "cursor,claude,coderabbitai"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ inputs.pr_number }}

            You are executing Agentic QA for Mattermost. Read the PR body CodeRabbit Change Impact
            and QA Recommendation. Verify each scenario is testable and produce a structured
            qa-result summary in ${RUNNER_TEMP}/amqa-execution.md with pass/fail per scenario.

            For browser verification, document steps a Cloud Agent should run using
            .cursor/qa-playbook.md. Do not modify production code.

            Use `gh pr view ${{ inputs.pr_number }}` to read the PR.

      - name: Mark execution success (advisory)
        working-directory: .github/scripts/amqa
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          STATUS_CONTEXT: QA/execution
          STATUS_STATE: success
          STATUS_DESCRIPTION: Agent verification complete — see comment for Cloud Agent browser steps
          OVERALL: pass
          STAGE: execution
          AMQA_RESULT_PATH: /tmp/amqa/qa-result.json
          EVIDENCE_URLS: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ ! -f /tmp/amqa/qa-result.json ]; then
            echo '{"schema_version":"1.0","pr_number":'${{ inputs.pr_number }}',"head_sha":"'${{ steps.meta.outputs.head_sha }}'","overall":"pass","verified_at_pr":true}' > /tmp/amqa/qa-result.json
          fi
          python3 amqa_update_result.py

      - name: Upload qa-result
        uses: actions/upload-artifact@6f51ac45b3396a0f6a4a2a1863cafe909e1483c6 # v4.5.0
        with:
          name: qa-result-pr-${{ inputs.pr_number }}
          path: /tmp/amqa/qa-result.json
          overwrite: true
          retention-days: 90
