---
name: E2E AI Auto-Heal

on:
  workflow_dispatch:
    inputs:
      test_pattern:
        type: string
        description: 'Optional: Specific test pattern to heal (regex)'
        required: false
      max_attempts:
        type: choice
        description: 'Maximum healing attempts'
        default: '3'
        options:
          - '1'
          - '2'
          - '3'
          - '5'
  workflow_run:
    workflows:
      - E2E Tests - Playwright
    types:
      - completed
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  detect-failures:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-24.04
    outputs:
      failures-detected: ${{ steps.analyze.outputs.failures-detected }}
      failure-count: ${{ steps.analyze.outputs.failure-count }}
      can-rerun: ${{ steps.extract_tests.outputs.has-failed-tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download previous test results
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: e2e-tests-playwright.yml
          run_id: ${{ github.event.workflow_run.id }}
          pattern: playwright-*-*-results
          path: test-results/
          merge-multiple: true

      - name: Analyze test failures
        id: analyze
        run: |
          if [ -f test-results/results/reporter/results.json ]; then
            FAILURES=$(jq '[.. | select(.status? == "failed" or .status? == "timedOut")] | length' test-results/results/reporter/results.json || echo 0)
            if [ "$FAILURES" -gt 0 ]; then
              echo "failures-detected=true" >> "$GITHUB_OUTPUT"
              echo "failure-count=$FAILURES" >> "$GITHUB_OUTPUT"
            else
              echo "failures-detected=false" >> "$GITHUB_OUTPUT"
              echo "failure-count=0" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "failures-detected=false" >> "$GITHUB_OUTPUT"
            echo "failure-count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract failed test paths
        id: extract_tests
        if: steps.analyze.outputs.failures-detected == 'true'
        run: |
          if [ -f test-results/results/reporter/results.json ]; then
            # Extract file paths of failed tests using jq
            jq -r '[.. | select(.status? == "failed" or .status? == "timedOut") | select(.file?) | .file] | unique | .[]' \
              test-results/results/reporter/results.json > failed_tests.txt 2>/dev/null || true

            # Count extracted tests
            TEST_COUNT=$(wc -l < failed_tests.txt || echo 0)
            echo "Extracted $TEST_COUNT failed test paths for rerun classification"

            if [ "$TEST_COUNT" -gt 0 ]; then
              echo "has-failed-tests=true" >> "$GITHUB_OUTPUT"
              # Store first few test names for logging
              echo "test-names=$(head -5 failed_tests.txt | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"
            else
              echo "has-failed-tests=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has-failed-tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload failed test list
        if: steps.extract_tests.outputs.has-failed-tests == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: failed-tests-for-rerun
          path: failed_tests.txt
          retention-days: 1

  heal-tests:
    needs: detect-failures
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (needs.detect-failures.outputs.failures-detected == 'true' && github.event_name == 'workflow_run')
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      MAX_ATTEMPTS: ${{ github.event.inputs.max_attempts || '3' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup E2E AI Agents environment
        uses: ./.github/actions/setup-e2e-ai-agents
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Start Mattermost server
        run: |
          docker compose -f docker-compose.yml up -d
          timeout 300 bash -c 'until curl -s http://localhost:8065/api/v4/system/ping | grep -q ok; do sleep 2; done' || exit 1

      - name: Sync test mappings
        working-directory: e2e-tests/playwright
        run: npm run test:manifest:sync

      - name: Download failed test list for rerun
        if: github.event_name == 'workflow_run' && needs.detect-failures.outputs.can-rerun == 'true'
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: e2e-tests-playwright.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: failed-tests-for-rerun
          path: .

      - name: Classify flaky vs regression (rerun failed tests)
        id: classify
        if: github.event_name == 'workflow_run'
        working-directory: e2e-tests/playwright
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual healing: allow all tests (user controlled)
            echo "flaky-classification=flaky" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_dispatch (manual healing)" >> "$GITHUB_OUTPUT"
            echo "Manual healing mode: skipping rerun classification"
            exit 0
          fi

          # For workflow_run: rerun failed tests to classify
          if [ ! -f ../failed_tests.txt ]; then
            echo "⚠️  No failed test list available (missing artifact)"
            echo "flaky-classification=unknown" >> "$GITHUB_OUTPUT"
            echo "reason=no_failed_test_list" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Rerun the failed tests
          TEST_COUNT=$(wc -l < ../failed_tests.txt)
          echo "🔄 Rerunning $TEST_COUNT failed tests to classify as flaky vs regression..."
          echo "Failed tests:"
          head -10 ../failed_tests.txt | sed 's/^/  - /'

          # Convert test paths to playwright args (path/test.spec.ts format)
          PLAYWRIGHT_ARGS=""
          while IFS= read -r test_path; do
            if [ -n "$test_path" ]; then
              # Normalize path relative to e2e-tests/playwright
              TEST_FILE="${test_path#e2e-tests/playwright/}"
              PLAYWRIGHT_ARGS="$PLAYWRIGHT_ARGS $TEST_FILE"
            fi
          done < ../failed_tests.txt

          # Run single rerun of failed tests (timeout 30min for full suite)
          set +e
          npx playwright test $PLAYWRIGHT_ARGS --workers=4 2>&1 | tee rerun_output.log
          RERUN_EXIT_CODE=$?
          set -e

          # Analyze rerun results
          if [ $RERUN_EXIT_CODE -eq 0 ]; then
            echo "✅ Rerun PASSED - Classifying as FLAKY"
            echo "flaky-classification=flaky" >> "$GITHUB_OUTPUT"
            echo "reason=rerun_passed" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Rerun FAILED - Classifying as REGRESSION"
            echo "flaky-classification=regression" >> "$GITHUB_OUTPUT"
            echo "reason=rerun_still_failed" >> "$GITHUB_OUTPUT"
          fi

          echo ""
          echo "Classification Result:"
          echo "  Status: $(grep flaky-classification $GITHUB_OUTPUT | cut -d= -f2)"
          echo "  Reason: $(grep reason $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Report classification decision
        if: github.event_name == 'workflow_run'
        run: |
          CLASSIFICATION="${{ steps.classify.outputs.flaky-classification }}"
          REASON="${{ steps.classify.outputs.reason }}"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Flaky vs Regression Classification"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Classification: $CLASSIFICATION"
          echo "Reason: $REASON"
          echo ""

          if [ "$CLASSIFICATION" = "flaky" ]; then
            echo "✅ Result: FLAKY FAILURE DETECTED"
            echo "   Action: Proceeding with auto-heal"
            echo ""
          elif [ "$CLASSIFICATION" = "regression" ]; then
            echo "⚠️  Result: LIKELY REGRESSION DETECTED"
            echo "   Action: SKIPPING auto-heal (not a selector issue)"
            echo "   Recommendation: Manual investigation required"
            echo ""
          else
            echo "❓ Result: CLASSIFICATION UNCERTAIN"
            echo "   Action: SKIPPING auto-heal (cannot determine cause)"
            echo "   Reason: $REASON"
            echo ""
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run auto-healing
        id: heal
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'workflow_run' && steps.classify.outputs.flaky-classification == 'flaky')
        working-directory: e2e-tests/playwright
        continue-on-error: true
        run: |
          CMD="npx @yasserkhanorg/e2e-agents auto-heal-pr"
          CMD="$CMD --path ../../webapp"
          CMD="$CMD --tests-root ."
          CMD="$CMD --config ./e2e-ai-agents.config.json"
          CMD="$CMD --pipeline-mcp"
          CMD="$CMD --pipeline-mcp-allow-fallback"

          echo "Running healing: $CMD"

          ATTEMPT=1
          MAX="${MAX_ATTEMPTS}"
          while [ $ATTEMPT -le "$MAX" ]; do
            echo "Healing Attempt $ATTEMPT / $MAX"
            if eval "$CMD"; then
              echo "healing-success=true" >> "$GITHUB_OUTPUT"
              echo "healing-attempt=$ATTEMPT" >> "$GITHUB_OUTPUT"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $ATTEMPT -gt "$MAX" ]; then
            echo "healing-success=false" >> "$GITHUB_OUTPUT"
            echo "healing-attempt=$MAX" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip auto-heal for regression/unknown
        if: |
          github.event_name == 'workflow_run' &&
          (steps.classify.outputs.flaky-classification == 'regression' ||
           steps.classify.outputs.flaky-classification == 'unknown')
        run: |
          CLASSIFICATION="${{ steps.classify.outputs.flaky-classification }}"
          echo ""
          echo "⏭️  SKIPPED auto-heal: $CLASSIFICATION classification"
          echo ""
          echo "healing-success=false" >> "$GITHUB_OUTPUT"
          echo "healing-attempt=0" >> "$GITHUB_OUTPUT"

      - name: Create healing summary
        if: always()
        working-directory: e2e-tests/playwright
        run: |
          mkdir -p .e2e-ai-agents
          cat > .e2e-ai-agents/healing-summary.json <<JSONEOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "healingMethod": "e2e-agents auto-heal",
            "max_attempts": "${MAX_ATTEMPTS}",
            "use_mcp": true,
            "success": "${{ steps.heal.outputs.healing-success }}",
            "attempt": "${{ steps.heal.outputs.healing-attempt }}",
            "failure_count": "${{ needs.detect-failures.outputs.failure-count }}"
          }
          JSONEOF

      - name: Commit healed tests
        if: steps.heal.outputs.healing-success == 'true'
        working-directory: .
        run: |
          git config user.name "E2E AI Bot"
          git config user.email "e2e-bot@mattermost.com"

          BRANCH_NAME="e2e-agents/auto-heal-$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"

          git add e2e-tests/playwright/specs/ || true
          git add e2e-tests/playwright/.e2e-ai-agents/healing-summary.json

          git commit -m "fix(e2e): Auto-healed test failures Automated healing using e2e-agents.
          Failures detected: ${{ needs.detect-failures.outputs.failure-count }}
          Healing method: UI re-discovery and selector refinement"

          # Push branch to remote
          git push origin "$BRANCH_NAME"

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Create healing pull request
        if: steps.heal.outputs.healing-success == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'E2E: Auto-healed test failures',
              head: process.env.BRANCH_NAME || 'e2e-agents/auto-heal',
              base: 'master',
              body: '## Auto-Healed E2E Tests\n\nFixed test failures using e2e-agents auto-healing.\n\nSee healing-summary.json for metrics.'
            });
            console.log('Created PR:', pr.data.html_url);

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.yml down || true

      - name: Report healing metrics
        if: always()
        run: |
          echo "✅ Auto-healing completed"
          echo "Failures detected: ${{ needs.detect-failures.outputs.failure-count }}"
          echo "Healing success: ${{ steps.heal.outputs.healing-success }}"
