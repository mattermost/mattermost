---
name: E2E AI Auto-Heal

# Triggers for automated test healing
on:
  workflow_dispatch:
    inputs:
      test_pattern:
        type: string
        description: 'Optional: Specific test pattern to heal (regex)'
        required: false
      max_attempts:
        type: choice
        description: 'Maximum healing attempts'
        default: '3'
        options:
          - '1'
          - '2'
          - '3'
          - '5'
      use_mcp:
        type: boolean
        description: 'Use Playwright MCP server for healing'
        default: false
  workflow_run:
    workflows:
      - E2E Tests - Playwright
    types:
      - completed
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  detect-failures:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-24.04
    outputs:
      failures-detected: ${{ steps.analyze.outputs.failures-detected }}
      failure-count: ${{ steps.analyze.outputs.failure-count }}
      failed-specs: ${{ steps.analyze.outputs.failed-specs }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download previous test results
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: e2e-tests-playwright.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: playwright-report
          path: test-results/

      - name: Analyze test failures
        id: analyze
        run: |
          if [ -f test-results/results.json ]; then
            FAILURES=$(jq '[.suites[].tests[] | select(.status == "failed" or .status == "timedOut")] | length' test-results/results.json || echo 0)

            if [ "$FAILURES" -gt 0 ]; then
              echo "failures-detected=true" >> "$GITHUB_OUTPUT"
              echo "failure-count=$FAILURES" >> "$GITHUB_OUTPUT"

              # Extract failed spec names
              SPECS=$(jq -r '.suites[].tests[] | select(.status == "failed" or .status == "timedOut") | .file' test-results/results.json | sort -u | tr '\n' ',' | sed 's/,$//')
              echo "failed-specs=$SPECS" >> "$GITHUB_OUTPUT"
            else
              echo "failures-detected=false" >> "$GITHUB_OUTPUT"
              echo "failure-count=0" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "failures-detected=false" >> "$GITHUB_OUTPUT"
            echo "failure-count=0" >> "$GITHUB_OUTPUT"
          fi

  heal-tests:
    needs: detect-failures
    if: needs.detect-failures.outputs.failures-detected == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: e2e-tests/playwright
        run: npm ci --legacy-peer-deps || npm install

      - name: Build project
        working-directory: e2e-tests/playwright
        run: npm run build

      - name: Start Mattermost server
        run: |
          docker compose -f docker-compose.yml up -d
          timeout 300 bash -c 'until curl -s http://localhost:8065/api/v4/system/ping | grep -q ok; do sleep 2; done' || exit 1

      - name: Run auto-healing
        id: heal
        working-directory: e2e-tests/playwright
        continue-on-error: true
        env:
          TEST_PATTERN: ${{ github.event.inputs.test_pattern || '' }}
          MAX_ATTEMPTS: ${{ github.event.inputs.max_attempts || '3' }}
          USE_MCP: ${{ github.event.inputs.use_mcp || 'false' }}
        run: |
          # Build heal command
          CMD="npx @yasserkhanorg/e2e-agents auto-heal-pr"
          CMD="$CMD --path ../../webapp"
          CMD="$CMD --tests-root ."
          CMD="$CMD --config ./e2e-ai-agents.config.json"

          echo "Running healing command..."
          echo "Command: $CMD"

          # Run healing with attempt counter
          ATTEMPT=1
          MAX="${MAX_ATTEMPTS}"
          while [ $ATTEMPT -le "$MAX" ]; do
            echo ""
            echo "=== Healing Attempt $ATTEMPT / $MAX ==="

            if eval "$CMD"; then
              echo "Healing successful on attempt $ATTEMPT"
              echo "healing-success=true" >> "$GITHUB_OUTPUT"
              echo "healing-attempt=$ATTEMPT" >> "$GITHUB_OUTPUT"
              break
            else
              if [ $ATTEMPT -lt "$MAX" ]; then
                echo "Healing attempt $ATTEMPT failed, retrying..."
                ATTEMPT=$((ATTEMPT + 1))
              else
                echo "All $MAX healing attempts failed"
                echo "healing-success=false" >> "$GITHUB_OUTPUT"
                echo "healing-attempt=$ATTEMPT" >> "$GITHUB_OUTPUT"
              fi
            fi
          done

      - name: Verify healed tests
        if: steps.heal.outputs.healing-success == 'true'
        working-directory: e2e-tests/playwright
        continue-on-error: true
        run: |
          echo "Running healed tests for verification..."
          npm test || true

      - name: Create healing summary
        if: always()
        working-directory: e2e-tests/playwright
        run: |
          mkdir -p .e2e-ai-agents

          node -e "
            const fs = require('fs');
            const summary = {
              timestamp: new Date().toISOString(),
              healingMethod: '@yasserkhanorg/e2e-agents auto-heal-pr',
              max_attempts: process.env.MAX_ATTEMPTS || '3',
              use_mcp: process.env.USE_MCP === 'true',
              success: '${{ steps.heal.outputs.healing-success }}' === 'true',
              attempt: parseInt('${{ steps.heal.outputs.healing-attempt || '0' }}'),
              failure_count: '${{ needs.detect-failures.outputs.failure-count }}'
            };

            fs.writeFileSync(
              '.e2e-ai-agents/healing-summary.json',
              JSON.stringify(summary, null, 2)
            );

            console.log('Healing Summary:');
            console.log('- Success:', summary.success);
            console.log('- Attempt:', summary.attempt, '/', summary.max_attempts);
            console.log('- Failures healed:', summary.failure_count);
          "

      - name: Commit healed tests
        if: steps.heal.outputs.healing-success == 'true'
        working-directory: .
        env:
          ATTEMPT: ${{ steps.heal.outputs.healing-attempt }}
          FAILURE_COUNT: ${{ needs.detect-failures.outputs.failure-count }}
        run: |
          git config user.name "E2E AI Bot"
          git config user.email "e2e-bot@mattermost.com"

          # Create healing branch
          BRANCH_NAME="e2e-agents/auto-heal-$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"

          # Stage healed test files
          git add e2e-tests/playwright/specs/
          git add e2e-tests/playwright/.e2e-ai-agents/healing-summary.json

          # Commit healing changes
          git commit -m "fix(e2e): Auto-heal tests using AI-driven discovery

Automated healing using @yasserkhanorg/e2e-agents:
- Failures detected: $FAILURE_COUNT
- Healing attempt: $ATTEMPT
- Method: UI re-discovery + selector refinement

Tests healed through:
1. UI re-discovery (fresh page exploration)
2. Selector confidence validation
3. Alternative selector identification
4. Test execution validation

This maintains test health and improves selector knowledge over time."

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Create healing pull request
        if: steps.heal.outputs.healing-success == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = process.env.BRANCH_NAME || 'e2e-agents/auto-heal';

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `E2E: Auto-healed test failures`,
              head: branchName,
              base: context.payload.workflow_run?.head_branch || 'master',
              body: `## Auto-Healed E2E Tests

Fixed test failures using e2e-ai-agents auto-healing.

### What Was Healed
Tests were automatically fixed through:
1. Fresh UI page exploration
2. Selector confidence validation
3. Alternative selector identification
4. Test execution verification

### Next Steps
1. Review healed selectors for accuracy
2. Run tests locally: \`npm test\`
3. Merge when verified

See \`healing-summary.json\` for detailed healing metrics.`
            });

            console.log('Created PR:', pr.data.html_url);

      - name: Cleanup Docker
        if: always()
        run: |
          docker compose -f docker-compose.yml down || true

      - name: Report healing metrics
        if: always()
        run: |
          echo "✅ Auto-healing completed"
          echo "📊 Failures detected: ${{ needs.detect-failures.outputs.failure-count }}"
          echo "🔧 Healing success: ${{ steps.heal.outputs.healing-success == 'true' && 'Yes' || 'No' }}"

          if [ -f e2e-tests/playwright/.e2e-ai-agents/healing-summary.json ]; then
            echo "📄 Summary: e2e-tests/playwright/.e2e-ai-agents/healing-summary.json"
          fi
