---
name: "PR Test Analysis Override"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to override"
        type: string
        required: true
      reason:
        description: "Reason for override"
        type: string
        required: true
      sender:
        description: "GitHub username (optional, defaults to workflow triggering actor)"
        type: string
        required: false

permissions:
  statuses: write

env:
  VERIFIED_PREFIX: "(override)"
  STATUS_CONTEXT: "Tests/analysis"
  REPORT_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL_TEST_PR_ANALYSIS_HUB }}
  SENDER: ${{ inputs.sender || github.actor }}

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: ci/resolve-pr-info
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')
          echo "commit_sha=${PR_JSON}" >> $GITHUB_OUTPUT

      - name: ci/post-override-status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.pr-info.outputs.commit_sha }}
        run: |
          # Read current commit status to preserve description
          STATUS_JSON=$(gh api repos/${{ github.repository }}/commits/${COMMIT_SHA}/statuses \
            --jq "[.[] | select(.context == \"${STATUS_CONTEXT}\")] | first // empty")

          CURRENT_DESC=""
          CURRENT_URL=""
          if [ -n "$STATUS_JSON" ]; then
            CURRENT_DESC=$(echo "$STATUS_JSON" | jq -r '.description // ""')
            CURRENT_URL=$(echo "$STATUS_JSON" | jq -r '.target_url // ""')
          fi

          # Strip any existing prefix to avoid stacking on repeated runs
          ESCAPED_PREFIX=$(echo "$VERIFIED_PREFIX" | sed 's/[()]/\\&/g')
          CLEAN_DESC=$(echo "$CURRENT_DESC" | sed "s/^${ESCAPED_PREFIX} *//")
          if [ -n "$CLEAN_DESC" ]; then
            NEW_DESC="${VERIFIED_PREFIX} ${CLEAN_DESC}"
          else
            NEW_DESC="${VERIFIED_PREFIX}"
          fi

          gh api repos/${{ github.repository }}/statuses/${COMMIT_SHA} \
            -f state=success \
            -f context="${STATUS_CONTEXT}" \
            -f description="${NEW_DESC:0:140}" \
            -f target_url="${CURRENT_URL:-${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"

          echo "Verified: ${NEW_DESC}"

      - name: ci/send-webhook
        if: env.REPORT_WEBHOOK_URL != ''
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ inputs.pr_number }}
          COMMIT_SHA: ${{ steps.pr-info.outputs.commit_sha }}
          SENDER: ${{ env.SENDER }}
          REASON: ${{ inputs.reason }}
        run: |
          PAYLOAD=$(jq -n \
            --arg sender "$SENDER" \
            --arg reason "$REASON" \
            --arg pr_num "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            --arg commit "${COMMIT_SHA:0:7}" \
            '{
              username: "Test Check",
              icon_url: "https://mattermost.com/wp-content/uploads/2022/02/icon_WS.png",
              text: "**Tests override via command**\n\nBy: `@\($sender)`\nReason: \($reason)\n[mattermost-pr-\($pr_num)](\($pr_url)), commit: `\($commit)`"
            }')

          curl -sS --max-time 30 -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$REPORT_WEBHOOK_URL"
