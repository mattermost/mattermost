name: Classify Server Flaky Tests
description: Classify high-confidence flaky server tests from a JUnit XML report
author: Mattermost

inputs:
  report-path:
    description: Path to the JUnit XML report file
    required: true

outputs:
  has_flaky:
    description: Whether the report contains high-confidence flaky tests
  flaky_markdown:
    description: Markdown table of high-confidence flaky tests

runs:
  using: node24
  main: dist/index.js
