name: Run in build environment
description: >
  Loads the build-server image (from a workflow artifact or Docker Hub) then
  runs the given bash script inside it, with the repository mounted at
  /mattermost and the working directory set to /mattermost/server.
  All GITHUB_* environment variables from the runner are forwarded into the
  container so scripts can reference GITHUB_HEAD_REF, GITHUB_RUN_ID, etc.

inputs:
  image:
    description: "Docker image reference"
    required: true
  artifact-name:
    description: "Artifact name from setup-buildenv. Empty = pull from registry."
    required: false
    default: ""
  run:
    description: "Bash script to execute inside the container"
    required: true

runs:
  using: composite
  steps:
    - uses: ./.github/actions/use-buildenv
      with:
        artifact-name: ${{ inputs.artifact-name }}
    - shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        CMD: ${{ inputs.run }}
      run: |
        GITHUB_ENV_FILE=$(mktemp)
        env | grep '^GITHUB_' > "${GITHUB_ENV_FILE}" || true
        docker run --rm \
          -v "$PWD:/mattermost" \
          -w /mattermost/server \
          --env-file "${GITHUB_ENV_FILE}" \
          "${IMAGE}" \
          bash -c "${CMD}"
        rm -f "${GITHUB_ENV_FILE}"
