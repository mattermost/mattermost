name: Run in build environment
description: >
  Runs a bash script inside the build-server Docker container. Normally the
  container image is pulled from Docker Hub on demand. During an in-flight Go
  version bump, load-buildenv ensures the locally-built image is available
  first. The repository is mounted at /mattermost with the working directory
  set to /mattermost/server.

inputs:
  run:
    description: "Bash script to execute inside the container"
    required: true
  fips-enabled:
    description: "Set to 'true' to use the FIPS build image"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: ./.github/actions/load-buildenv
    - name: Read Go version
      shell: bash
      run: echo "GO_VERSION=$(cat server/.go-version)" >> "${GITHUB_ENV}"
    - name: Resolve image
      shell: bash
      env:
        FIPS: ${{ inputs.fips-enabled }}
      run: |
        if [[ "${FIPS}" == 'true' ]]; then
          echo "IMAGE=mattermost/mattermost-build-server-fips:${GO_VERSION}" >> "${GITHUB_ENV}"
        else
          echo "IMAGE=mattermost/mattermost-build-server:${GO_VERSION}" >> "${GITHUB_ENV}"
        fi
    - shell: bash
      env:
        CMD: ${{ inputs.run }}
      run: |
        docker run --rm \
          -v "$PWD:/mattermost" \
          -w /mattermost/server \
          "${IMAGE}" \
          bash -c "${CMD}"
