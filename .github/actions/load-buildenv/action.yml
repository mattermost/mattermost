name: Load build environment
description: >
  Loads whichever build-server image artifacts were created by setup-buildenv
  in this workflow run. If no artifacts exist (the canonical images were already
  on Docker Hub), this is a no-op and images will be pulled from the registry
  on demand when docker run executes.

runs:
  using: composite
  steps:
    - name: Download buildenv artifact
      id: download
      continue-on-error: true
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: buildenv-image
        path: /tmp/buildenv-image/
    - name: Load buildenv from artifact
      if: steps.download.outcome == 'success'
      shell: bash
      run: docker load -i /tmp/buildenv-image/image.tar.gz
    - name: Download buildenv-fips artifact
      id: download-fips
      continue-on-error: true
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: buildenv-fips-image
        path: /tmp/buildenv-fips-image/
    - name: Load buildenv-fips from artifact
      if: steps.download-fips.outcome == 'success'
      shell: bash
      run: docker load -i /tmp/buildenv-fips-image/image.tar.gz
