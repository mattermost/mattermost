---
name: Calculate Playwright Test Results
description: Parse Playwright JSON test results and calculate pass/fail counts

inputs:
  results_path:
    description: Path to the Playwright results directory (e.g., e2e-tests/playwright/results)
    required: true

outputs:
  passed:
    description: Number of passed tests (including flaky tests that passed on retry)
    value: ${{ steps.calculate.outputs.passed }}
  failed:
    description: Number of failed tests
    value: ${{ steps.calculate.outputs.failed }}
  flaky:
    description: Number of flaky tests (failed initially but passed on retry)
    value: ${{ steps.calculate.outputs.flaky }}
  skipped:
    description: Number of skipped tests
    value: ${{ steps.calculate.outputs.skipped }}
  total_specs:
    description: Total number of spec files
    value: ${{ steps.calculate.outputs.total_specs }}
  commit_status_message:
    description: Message for commit status (e.g., "X failed, Y passed (Z spec files)")
    value: ${{ steps.calculate.outputs.commit_status_message }}
  failed_specs:
    description: Comma-separated list of failed spec files (for retest)
    value: ${{ steps.calculate.outputs.failed_specs }}
  failed_specs_count:
    description: Number of failed spec files
    value: ${{ steps.calculate.outputs.failed_specs_count }}
  failed_tests:
    description: Markdown table rows of failed tests (for GitHub summary)
    value: ${{ steps.calculate.outputs.failed_tests }}
  total:
    description: Total number of tests (passed + flaky + failed)
    value: ${{ steps.calculate.outputs.total }}
  pass_rate:
    description: Pass rate percentage (e.g., "100.00")
    value: ${{ steps.calculate.outputs.pass_rate }}
  passing:
    description: Number of passing tests (passed + flaky)
    value: ${{ steps.calculate.outputs.passing }}
  color:
    description: Color for webhook based on pass rate (green=100%, yellow=99%+, orange=98%+, red=<98%)
    value: ${{ steps.calculate.outputs.color }}

runs:
  using: composite
  steps:
    - name: ci/calculate-playwright-results
      id: calculate
      shell: bash
      run: |
        RESULTS_PATH="${{ inputs.results_path }}"
        RESULTS_JSON="${RESULTS_PATH}/reporter/results.json"

        PASSED=0
        FAILED=0
        FLAKY=0
        SKIPPED=0
        TOTAL_SPECS=0
        FAILED_SPECS=""

        if [ -f "$RESULTS_JSON" ]; then
          echo "Parsing Playwright results from: $RESULTS_JSON"

          # Count unique spec files
          TOTAL_SPECS=$(jq '[.suites[] | .file] | unique | length' "$RESULTS_JSON" 2>/dev/null || echo "0")

          # Use stats object for accurate counts (handles nested suites)
          PASSED=$(jq '.stats.expected // 0' "$RESULTS_JSON" 2>/dev/null || echo "0")
          FAILED=$(jq '.stats.unexpected // 0' "$RESULTS_JSON" 2>/dev/null || echo "0")
          FLAKY=$(jq '.stats.flaky // 0' "$RESULTS_JSON" 2>/dev/null || echo "0")
          SKIPPED=$(jq '.stats.skipped // 0' "$RESULTS_JSON" 2>/dev/null || echo "0")

          # Extract failed spec files using recursive descent (handles nested suites)
          if [ "$FAILED" -gt 0 ]; then
            FAILED_SPECS=$(jq -r '
              [.. | objects | select(.status? == "unexpected") | .location?.file // empty] |
              unique | map(select(. != null)) | join(",")
            ' "$RESULTS_JSON" 2>/dev/null || echo "")
          fi
        else
          echo "Warning: Playwright results.json not found at $RESULTS_JSON"
        fi

        # Handle case where no results found
        if [ "$PASSED" = "0" ] && [ "$FAILED" = "0" ] && [ "$TOTAL_SPECS" = "0" ]; then
          echo "Warning: No Playwright test results found"
          FAILED=1  # Treat as failure if no results
        fi

        # Build commit status message
        if [ "$TOTAL_SPECS" -gt 0 ]; then
          SPEC_SUFFIX=" in ${TOTAL_SPECS} spec files"
        else
          SPEC_SUFFIX=""
        fi

        if [ "$FAILED" = "0" ]; then
          COMMIT_STATUS_MESSAGE="${PASSED} passed${SPEC_SUFFIX}"
        else
          COMMIT_STATUS_MESSAGE="${FAILED} failed, ${PASSED} passed${SPEC_SUFFIX}"
        fi

        # Count failed spec files
        if [ -n "$FAILED_SPECS" ]; then
          FAILED_SPECS_COUNT=$(echo "$FAILED_SPECS" | tr ',' '\n' | wc -l | tr -d ' ')
        else
          FAILED_SPECS_COUNT=0
        fi

        # Extract failed tests for GitHub summary (markdown table rows)
        FAILED_TESTS=""
        if [ "$FAILED" -gt 0 ] && [ -f "$RESULTS_JSON" ]; then
          FAILED_TESTS=$(jq -r '
            [.. | objects | select(.status? == "unexpected") | {title: .title, file: .location?.file}] |
            map(select(.title != null and .file != null)) |
            unique_by(.file + .title) |
            .[] |
            "| \(.title | gsub("`"; "\\`") | gsub("\\|"; "\\|")) | \(.file) |"
          ' "$RESULTS_JSON" 2>/dev/null || echo "")

          # Limit to 10 entries
          TOTAL_FAILED_LINES=$(echo "$FAILED_TESTS" | grep -c '^|' || echo "0")
          if [ "$TOTAL_FAILED_LINES" -gt 10 ]; then
            FAILED_TESTS=$(echo "$FAILED_TESTS" | head -10)
            REMAINING=$((TOTAL_FAILED_LINES - 10))
            FAILED_TESTS="${FAILED_TESTS}"$'\n'"| _...and ${REMAINING} more failed tests_ | |"
          fi
        fi

        if [ -z "$FAILED_TESTS" ] && [ "$FAILED" -gt 0 ]; then
          FAILED_TESTS="| Unable to parse failed tests | - |"
        fi

        # Calculate total and pass rate
        # Pass rate = (passed + flaky) / (passed + flaky + failed), excluding skipped/pending
        PASSING=$((PASSED + FLAKY))
        TOTAL=$((PASSING + FAILED))
        if [ "$TOTAL" -gt 0 ]; then
          PASS_RATE=$(echo "scale=2; ($PASSING * 100) / $TOTAL" | bc)
        else
          PASS_RATE="0.00"
        fi

        # Determine color based on pass rate: green=100%, yellow=99%+, orange=98%+, red=<98%
        if (( $(echo "$PASS_RATE == 100" | bc -l) )); then
          COLOR="#43A047"
        elif (( $(echo "$PASS_RATE >= 99" | bc -l) )); then
          COLOR="#FFEB3B"
        elif (( $(echo "$PASS_RATE >= 98" | bc -l) )); then
          COLOR="#FF9800"
        else
          COLOR="#F44336"
        fi

        # Print results
        echo "========================================"
        echo "Playwright Test Results:"
        echo "  Passed: ${PASSED}"
        echo "  Failed: ${FAILED}"
        echo "  Flaky: ${FLAKY}"
        echo "  Skipped: ${SKIPPED}"
        echo "  Passing: ${PASSING} (passed + flaky)"
        echo "  Total: ${TOTAL}"
        echo "  Pass Rate: ${PASS_RATE}%"
        echo "  Color: ${COLOR}"
        echo "  Spec Files: ${TOTAL_SPECS}"
        echo "  Failed Specs Count: ${FAILED_SPECS_COUNT}"
        echo "  Status Message: ${COMMIT_STATUS_MESSAGE}"
        echo "  Failed Specs: ${FAILED_SPECS:-none}"
        echo "========================================"

        # Set outputs
        echo "passed=${PASSED}" >> $GITHUB_OUTPUT
        echo "failed=${FAILED}" >> $GITHUB_OUTPUT
        echo "flaky=${FLAKY}" >> $GITHUB_OUTPUT
        echo "skipped=${SKIPPED}" >> $GITHUB_OUTPUT
        echo "total_specs=${TOTAL_SPECS}" >> $GITHUB_OUTPUT
        echo "commit_status_message=${COMMIT_STATUS_MESSAGE}" >> $GITHUB_OUTPUT
        echo "failed_specs=${FAILED_SPECS}" >> $GITHUB_OUTPUT
        echo "failed_specs_count=${FAILED_SPECS_COUNT}" >> $GITHUB_OUTPUT
        echo "total=${TOTAL}" >> $GITHUB_OUTPUT
        echo "pass_rate=${PASS_RATE}" >> $GITHUB_OUTPUT
        echo "passing=${PASSING}" >> $GITHUB_OUTPUT
        echo "color=${COLOR}" >> $GITHUB_OUTPUT

        # Set multiline output for failed_tests
        {
          echo "failed_tests<<EOF"
          echo "$FAILED_TESTS"
          echo "EOF"
        } >> $GITHUB_OUTPUT
