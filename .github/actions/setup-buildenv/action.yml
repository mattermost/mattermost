name: Setup build environment
description: >
  Resolves the build-server Docker images for this workflow run. If the
  canonical version-tagged images (mattermost-build-server and
  mattermost-build-server-fips) already exist on Docker Hub, nothing is
  built. If not (e.g. in-flight Go version bump), the missing images are
  built from their Dockerfiles and uploaded as workflow artifacts for
  load-buildenv to consume in downstream jobs. The FIPS image requires
  Docker Hub and Chainguard authentication and is skipped on fork PRs
  where those credentials are unavailable.

inputs:
  go-version:
    description: "Go version (e.g. 1.26.3)"
    required: true

runs:
  using: composite
  steps:
    # ── Regular ────────────────────────────────────────────────────────
    - name: Resolve regular image
      id: resolve
      shell: bash
      env:
        GO_VERSION: ${{ inputs.go-version }}
      run: |
        CANONICAL="mattermost/mattermost-build-server:${GO_VERSION}"
        if docker manifest inspect "${CANONICAL}" > /dev/null 2>&1; then
          echo "artifact-name=" >> "${GITHUB_OUTPUT}"
        else
          echo "artifact-name=buildenv-image" >> "${GITHUB_OUTPUT}"
        fi
    - name: Build regular image
      if: ${{ steps.resolve.outputs.artifact-name != '' }}
      shell: bash
      env:
        GO_VERSION: ${{ inputs.go-version }}
      run: docker build -t "mattermost/mattermost-build-server:${GO_VERSION}" - < server/build/Dockerfile.buildenv
    - name: Save and upload regular image
      if: ${{ steps.resolve.outputs.artifact-name != '' }}
      shell: bash
      env:
        GO_VERSION: ${{ inputs.go-version }}
      run: |
        mkdir -p /tmp/buildenv-save
        docker save "mattermost/mattermost-build-server:${GO_VERSION}" | gzip > /tmp/buildenv-save/image.tar.gz
    - name: Upload regular image artifact
      if: ${{ steps.resolve.outputs.artifact-name != '' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: buildenv-image
        path: /tmp/buildenv-save/image.tar.gz
        retention-days: 1
    # ── FIPS (skipped on fork PRs) ─────────────────────────────────────
    - name: Docker Hub login
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ env.DOCKERHUB_TOKEN }}
    - name: Setup Chainctl
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: chainguard-dev/setup-chainctl@c125f765e82b09a42af3185f3214465314d75c5d # v0.5.0
      with:
        identity: ${{ env.CHAINCTL_IDENTITY }}
    - name: Resolve FIPS image
      id: resolve-fips
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      shell: bash
      env:
        GO_VERSION: ${{ inputs.go-version }}
      run: |
        CANONICAL="mattermost/mattermost-build-server-fips:${GO_VERSION}"
        if docker manifest inspect "${CANONICAL}" > /dev/null 2>&1; then
          echo "artifact-name=" >> "${GITHUB_OUTPUT}"
        else
          echo "artifact-name=buildenv-fips-image" >> "${GITHUB_OUTPUT}"
        fi
    - name: Build FIPS image
      if: ${{ steps.resolve-fips.outputs.artifact-name != '' }}
      shell: bash
      env:
        GO_VERSION: ${{ inputs.go-version }}
      run: docker build -t "mattermost/mattermost-build-server-fips:${GO_VERSION}" - < server/build/Dockerfile.buildenv-fips
    - name: Save and upload FIPS image
      if: ${{ steps.resolve-fips.outputs.artifact-name != '' }}
      shell: bash
      env:
        GO_VERSION: ${{ inputs.go-version }}
      run: |
        mkdir -p /tmp/buildenv-fips-save
        docker save "mattermost/mattermost-build-server-fips:${GO_VERSION}" | gzip > /tmp/buildenv-fips-save/image.tar.gz
    - name: Upload FIPS image artifact
      if: ${{ steps.resolve-fips.outputs.artifact-name != '' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: buildenv-fips-image
        path: /tmp/buildenv-fips-save/image.tar.gz
        retention-days: 1
