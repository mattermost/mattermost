name: Setup build environment
description: >
  Resolves the build-server Docker image for this workflow run. If the
  canonical version-tagged image already exists on Docker Hub, it is used
  as-is. If not (in-flight Go version bump), the image is built from the
  Dockerfile, saved as a workflow artifact, and the artifact name is returned
  so downstream jobs can load it via use-buildenv.

  The caller is responsible for authenticating Docker Hub and Chainguard
  before invoking this action so that manifest inspection and image builds
  work correctly.

inputs:
  go-version:
    description: "Go version (e.g. 1.26.3)"
    required: true
  fips-enabled:
    description: "Set to 'true' to use the FIPS build image"
    required: false
    default: "false"

outputs:
  artifact-name:
    description: "Artifact name for use-buildenv in downstream jobs; empty if canonical image was used"
    value: ${{ steps.resolve.outputs.artifact-name }}

runs:
  using: composite
  steps:
    - name: Resolve image
      id: resolve
      shell: bash
      env:
        GO_VERSION: ${{ inputs.go-version }}
        FIPS: ${{ inputs.fips-enabled }}
      run: |
        if [[ "${FIPS}" == 'true' ]]; then
          CANONICAL="mattermost/mattermost-build-server-fips:${GO_VERSION}"
          ARTIFACT_NAME="buildenv-fips-image"
          DOCKERFILE="server/build/Dockerfile.buildenv-fips"
        else
          CANONICAL="mattermost/mattermost-build-server:${GO_VERSION}"
          ARTIFACT_NAME="buildenv-image"
          DOCKERFILE="server/build/Dockerfile.buildenv"
        fi
        echo "canonical=${CANONICAL}" >> "${GITHUB_OUTPUT}"
        echo "dockerfile=${DOCKERFILE}" >> "${GITHUB_OUTPUT}"
        if docker manifest inspect "${CANONICAL}" > /dev/null 2>&1; then
          echo "artifact-name=" >> "${GITHUB_OUTPUT}"
        else
          echo "artifact-name=${ARTIFACT_NAME}" >> "${GITHUB_OUTPUT}"
        fi
    - name: Build image
      if: ${{ steps.resolve.outputs.artifact-name != '' }}
      shell: bash
      run: docker build -t "${{ steps.resolve.outputs.canonical }}" - < "${{ steps.resolve.outputs.dockerfile }}"
    - name: Save image
      if: ${{ steps.resolve.outputs.artifact-name != '' }}
      shell: bash
      run: |
        mkdir -p /tmp/buildenv-save
        docker save "${{ steps.resolve.outputs.canonical }}" | gzip > /tmp/buildenv-save/image.tar.gz
    - name: Upload image artifact
      if: ${{ steps.resolve.outputs.artifact-name != '' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ steps.resolve.outputs.artifact-name }}
        path: /tmp/buildenv-save/image.tar.gz
        retention-days: 1
