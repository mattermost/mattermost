# Codecov configuration for Mattermost server
# https://docs.codecov.io/docs/codecov-yaml
#
# This file configures coverage reporting behavior, including which paths
# to ignore (generated code, test helpers, mocks) and PR comment settings.

codecov:
  require_ci_to_pass: false

coverage:
  status:
    # Project-level coverage gates
    project:
      default:
        target: auto    # Compare against base commit
        threshold: 0.5% # Allow 0.5% drop without failing
        if_ci_failed: error
    # Per-patch coverage (new/changed lines only)
    patch:
      default:
        target: 60%
        threshold: 5%

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: true  # Only comment when coverage changes

ignore:
  # Generated store layers (~28k lines, auto-generated, not meant to be tested directly)
  - "server/channels/store/retrylayer"
  - "server/channels/store/timerlayer"

  # Test helpers and fixtures (not production code)
  - "server/channels/store/storetest"

  # Mock files (auto-generated by mockery)
  - "**/mocks"

  # Serialization codegen
  - "**/*_serial_gen.go"

  # Plugin test helpers
  - "server/public/plugin/plugintest"

  # mmctl mocks
  - "server/cmd/mmctl/mocks"
