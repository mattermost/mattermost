<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Techzen Horizontal Logo for Mattermost sidebar/header -->

  <!-- Planet/Globe Icon Group -->
  <g transform="translate(5, 5)">
    <!-- Outer red orbit ellipse (top arc) -->
    <ellipse cx="25" cy="25" rx="24" ry="10" fill="none" stroke="#c62828" stroke-width="4" stroke-linecap="round"
      transform="rotate(-25, 25, 25)"
      stroke-dasharray="100 33"/>

    <!-- Globe circle -->
    <circle cx="25" cy="25" r="18" fill="white" stroke="#c62828" stroke-width="3"/>

    <!-- Red horizontal stripes inside globe -->
    <rect x="15" y="18" width="14" height="3" rx="1.5" fill="#c62828" transform="rotate(-15, 22, 19.5)"/>
    <rect x="14" y="23" width="16" height="3" rx="1.5" fill="#c62828" transform="rotate(-15, 22, 24.5)"/>
    <rect x="15" y="28" width="14" height="3" rx="1.5" fill="#c62828" transform="rotate(-15, 22, 29.5)"/>

    <!-- Navy blue swoosh/arrow at bottom-right -->
    <path d="M 36 31 Q 45 37 37 44 Q 32 47 25 45" fill="none" stroke="#1a237e" stroke-width="4.5" stroke-linecap="round"/>
    <polygon points="23.5,41.5 26.5,47.5 30,43.5" fill="#1a237e"/>
  </g>

  <!-- "TECHZEN" text -->
  <text x="58" y="38"
    font-family="Arial Black, Arial, sans-serif"
    font-size="24"
    font-weight="900"
    fill="#1a237e"
    letter-spacing="1">TECHZEN</text>
</svg>